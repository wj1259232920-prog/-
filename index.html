var QUESTION_DATA = {"single": [{"id": 1, "question": "“两会”是_____和_____的简称。", "answer": "C", "options": {"A": "全国人大代表大会，全国人大常务委员会议", "B": "中国人民政治协商会议，中国共产党全国代表大会", "C": "全国人民代表大会，中国人民政治协商会议", "D": "中国人民政治协商会议，全国人大常务委员会议"}}, {"id": 2, "question": "在人大代表的间接选举中，候选人人数要多于代表人数_____通过无记名投票选举，候选人获得_____的选票才当选。", "answer": "C", "options": {"A": "1/5-1倍,全体代表2/3", "B": "1/5-1/4,全体代表3/4", "C": "1/5-1/2,全体代表过半数", "D": "1/4-2/3,全体代表过半数"}}, {"id": 3, "question": "关于中国共产党、人民代表大会、人民政协三者的关系，下列说法正确的是_____。", "answer": "B", "options": {"A": "人民代表大会在中国共产党和人民政协等国家机关体系中处于核心地位", "B": "人民代表大会和人民政协都必须坚持中国共产党的领导", "C": "中国共产党和人民政协所做出的决定必须征得人民代表大会的认可后方能实施", "D": "人民代表大会同中国共产党、人民政协的关系是领导与被领导、监督与被监督的关系"}}, {"id": 4, "question": "宪法的修改需由全国人民代表大会常务委员会或_____以上的全国人民代表大会代表提议，采取投票方式表决，由全体代表的_____以上的多数通过。", "answer": "B", "options": {"A": "1/4；2/3", "B": "1/5；2/3", "C": "1/10；1/2", "D": "1/4；1/2"}}, {"id": 5, "question": "习近平主席强调，实现中国梦必须凝聚中国力量，这就是中国_____的力量。", "answer": "D", "options": {"A": "人民群众", "B": "中国共产党", "C": "社会各阶层", "D": "各族人民大团结"}}, {"id": 6, "question": "全国人民大表大会通过的法律由谁签署予以公布_____。", "answer": "A", "options": {"A": "国家主席", "B": "全国人大委员会委员长", "C": "国务院总理", "D": "中共中央总书记"}}, {"id": 7, "question": "为了便于经常举行会议，集体行使职权，全国人大和县级以上地方各级人大设立_____，作为其常设机关，主要在人大闭会期间行使国家权力。", "answer": "D", "options": {"A": "常委会办公厅", "B": "法制工作委员会", "C": "预算工作委员会", "D": "常委会"}}, {"id": 8, "question": "全国政协下属的专门委员会不包括_____。", "answer": "D", "options": {"A": "提案委员会", "B": "经济委员会", "C": "外事委员会", "D": "农业和农村委员会"}}, {"id": 9, "question": "_____是中国特色社会主义最本质的特征，是社会主义法治最根本的保证。", "answer": "D", "options": {"A": "依宪执政", "B": "民主执政", "C": "依宪治国", "D": "党的领导"}}, {"id": 10, "question": "全面推进依法治国的总目标，即_____，建设社会主义法治国家。", "answer": "C", "options": {"A": "推进法治社会建设", "B": "促进国家治理体系和治理能力现代化", "C": "建设中国特色社会主义法治体系", "D": "增强全民法治观念"}}, {"id": 11, "question": "《党章》指出：党在自己的工作中实行_____，一切为了群众，一切依靠群众，从群众中来，到群众中去，把党的正确主张变为群众的自觉行动。", "answer": "C", "options": {"A": "组织路线", "B": "政治路线", "C": "群众路线", "D": "军事路线"}}, {"id": 12, "question": "《党章》规定，企业、农村、机关、学校、医院、科研院所、街道社区、社会组织、人民解放军连队和其他基层单位，凡是有正式党员 _____人以上的，都应当成立党的基层组织。", "answer": "A", "options": {"A": "3", "B": "6", "C": "8", "D": "5"}}, {"id": 13, "question": "《党章》规定，党的全国代表大会每五年举行一次,由中央委员会召集。中央委员会认为有必要,或者有_____以上的省一级组织提出要求,全国代表大会可以提前举行;如无非常情况,不得延期举行。", "answer": "C", "options": {"A": "二分之一", "B": "四分之一", "C": "三分之一", "D": "五分之一"}}, {"id": 14, "question": "《党章》规定，党坚持_____。党除了工人阶级和最广大人民群众的利益，没有自己特殊的利益。", "answer": "C", "options": {"A": "为民务实清廉", "B": "建设廉洁型政党", "C": "全心全意为人民服务", "D": "实现共产主义"}}, {"id": 15, "question": "《党章》规定，党的最大政治优势是 _____，党执政后的最大危险是脱离群众。党风问题、党同人民群众联系问题是关系党生死存亡的问题。", "answer": "C", "options": {"A": "对马克思主义的信仰", "B": "批评与自我批评", "C": "密切联系群众", "D": "改革开放"}}, {"id": 16, "question": "《党章》规定，对党的中央委员会和地方各级委员会的委员、候补委员，给以撤销党内职务、留党察看或开除党籍的处分，必须由本人所在的委员会全体会议_____的多数决定。", "answer": "C", "options": {"A": "三分之一", "B": "五分之一", "C": "三分之二", "D": "五分之二"}}, {"id": 17, "question": "《党章》中关于留党察看党员的权利，表述正确的是_____。", "answer": "A", "options": {"A": "党员在留党察看期间没有表决权、选举权和被选举权", "B": "党员在留党察看期间没有表决权，但有选举权和被选举权", "C": "党员在留党察看期间有表决权，但没有选举权和被选举权", "D": "党员在留党察看期间有表决权、选举权和被选举权"}}, {"id": 18, "question": "《党章》规定,对于严重触犯刑律的党员，必须_____。", "answer": "A", "options": {"A": "开除党籍", "B": "留党察看", "C": "撤销党内职务", "D": "开除公职"}}, {"id": 19, "question": "《党章》规定,党的纪律是党的_____必须遵守的行为规则，是维护党的团结统一、完成党的任务的保证。", "answer": "C", "options": {"A": "基层组织", "B": "所有干部", "C": "各级组织和全体党员", "D": "领导干部"}}, {"id": 20, "question": "《党章》规定,凡属重大问题，党的各级委员会都要按照集体领导、民主集中、个别酝酿、_____的原则，由党的委员会集体讨论，作出决定。", "answer": "A", "options": {"A": "会议决定", "B": "书记个人决定", "C": "常委会决定", "D": "书记办公会"}}, {"id": 21, "question": "《党章》规定,党的民主集中制的基本原则之一是“四个服从”，即党员个人服从党的组织，_____，下级组织服从上级组织，全党各个组织和全体党员服从党的全国代表大会和中央委员会。", "answer": "B", "options": {"A": "委员服从党委书记", "B": "少数服从多数", "C": "普通党员服从党组织书记", "D": "以上都不是"}}, {"id": 22, "question": "《党章》规定,党员如果没有正当理由，连续_____不参加党的组织生活，或不交纳党费，或不做党所分配的工作，就被认为是自行脱党。", "answer": "B", "options": {"A": "3个月", "B": "6个月", "C": "12个月", "D": "24个月"}}, {"id": 23, "question": "对马克思主义的信仰,对社会主义和共产主义的信念,是共产党人的_____,是共产党人经受住任何考验的精神支柱。", "answer": "A", "options": {"A": "政治灵魂", "B": "价值取向", "C": "精神追求", "D": "思想品质"}}, {"id": 24, "question": "_____是兴国之魂，决定中国特色社会主义方向。", "answer": "B", "options": {"A": "社会主义制度", "B": "社会主义核心价值体系", "C": "改革开放", "D": "社会主义基本理论"}}, {"id": 25, "question": "_____是我国人民民主的重要形式。", "answer": "C", "options": {"A": "党务公开", "B": "政务公开", "C": "社会主义协商民主", "D": "社会民主"}}, {"id": 26, "question": "《党章》规定中国共产党党员永远是_____。", "answer": "B", "options": {"A": "工人阶级普通一员", "B": "劳动人民普通一员", "C": "中国公民普通一员", "D": "中国工农普通一员"}}, {"id": 27, "question": "中国特色社会主义制度_____。", "answer": "B", "options": {"A": "集中体现了发展经济的优势", "B": "集中体现了中国特色社会主义的特点和优势", "C": "集中体现了创新的优势", "D": "集中体现人民团结的优势"}}, {"id": 28, "question": "_____是保证人民当家作主的根本政治制度。", "answer": "B", "options": {"A": "政治协商制度", "B": "人民代表大会制度", "C": "民族区域自治制度", "D": "社会主义经济制度"}}, {"id": 29, "question": "_____是中国特色社会主义事业的领导核心。", "answer": "B", "options": {"A": "全国人大", "B": "中国共产党", "C": "全国政协", "D": "国务院"}}, {"id": 30, "question": "党的基层组织要密切联系群众，经常了解群众对党员、党的工作的批评和意见，维护群众的_____ ，做好群众的思想政治工作。", "answer": "A", "options": {"A": "正当权利和利益", "B": "长远利益", "C": "根本利益", "D": "具体利益"}}, {"id": 31, "question": "党的基层组织要对党员进行_____，提高党员素质，坚定理想信念，增强党性，严格党的组织生活，开展批评和自我批评，维护和执行党的纪律，监督党员切实履行义务，保障党员的权利不受侵犯。加强和改进流动党员管理。", "answer": "C", "options": {"A": "教育、培养、管理和服务", "B": "培养、管理、监督和服务", "C": "教育、管理、监督和服务", "D": "管理、监督、关心和服务"}}, {"id": 32, "question": "党的全国代表大会每_____ 举行一次，由中央委员会召集。", "answer": "B", "options": {"A": "四年", "B": "五年", "C": "六年", "D": "三年"}}, {"id": 33, "question": "任何党员不论职务高低，都不能个人决定重大问题；如遇紧急情况，必须由个人作出决定时，事后要迅速向_____报告。", "answer": "A", "options": {"A": "党组织", "B": "上级领导", "C": "上级党组织", "D": "分管领导"}}, {"id": 34, "question": "如对重要问题发生争论，双方人数接近，除了在紧急情况下必须按多数意见执行外，应当_____，进一步调查研究，交换意见，下次再表决；在特殊情况下，也可将争论情况向上级组织报告，请求裁决。", "answer": "C", "options": {"A": "暂缓执行", "B": "暂缓决定", "C": "暂缓作出决定", "D": "暂缓作出裁决"}}, {"id": 35, "question": "对于少数人的不同意见，应当_____。", "answer": "A", "options": {"A": "认真考虑", "B": "充分考虑", "C": "全面考虑", "D": "可不考虑"}}, {"id": 36, "question": "党组织讨论决定问题，必须执行_____的原则。", "answer": "C", "options": {"A": "投票表决", "B": "举手表决", "C": "少数服从多数", "D": "上级指示"}}, {"id": 37, "question": "党禁止任何形式的个人崇拜。要保证党的领导人的活动处于_____之下，同时维护一切代表党和人民利益的领导人的威信。", "answer": "C", "options": {"A": "人民的监督", "B": "党内外群众监督", "C": "党和人民的监督", "D": "民主党派和人民的监督"}}, {"id": 38, "question": "党的上下级组织之间要互通情报_____。", "answer": "A", "options": {"A": "互相支持和互相监督", "B": "互相配合和互相监督", "C": "互相沟通和互相配合", "D": "互相沟通和互相帮助"}}, {"id": 39, "question": "党的最高_____机关，是党的全国代表大会和它所产生的中央委员会。", "answer": "B", "options": {"A": "政治", "B": "领导", "C": "组织", "D": "权力"}}, {"id": 40, "question": "党的各级领导机关，除它们派出的代表机关和在_____中的党组外，都由选举产生。", "answer": "D", "options": {"A": "党外组织", "B": "中间组织", "C": "社会组织", "D": "非党组织"}}, {"id": 41, "question": "党的民主集中制的基本原则有_____。", "answer": "A", "options": {"A": "六条", "B": "七条", "C": "八条", "D": "十条"}}, {"id": 42, "question": "中国共产党党员必须履行的义务有_____ 。", "answer": "B", "options": {"A": "6条", "B": "8条", "C": "10条", "D": "12条"}}, {"id": 43, "question": "党必须加强对_____群团组织的领导，使它们保持和增强政治性、先进性、群众性，充分发挥作用。", "answer": "C", "options": {"A": "工会、青年团、学生会、研究生会等", "B": "工会、共青团、妇委会、学生会等", "C": "工会、共产主义青年团、妇女联合会等", "D": "工会、民间组织、社会团体、妇女联合会等"}}, {"id": 44, "question": "中国共产党同全国各民族工人、农民、知识分子团结在一起，同各民主党派、无党派人士、各民族的爱国力量团结在一起，进一步发展和壮大由全体社会主义劳动者、社会主义事业建设者、拥护社会主义的爱国者、_______组成的最广泛的爱国统一战线。", "answer": "D", "options": {"A": "社会主义事业的劳动者", "B": "社会主义现代化的建设者", "C": "拥护中国特色社会主义的爱国者", "D": "拥护祖国统一和致力于中华民族伟大复兴的爱国者"}}, {"id": 45, "question": "中国共产党维护和发展_____的社会主义民族关系。", "answer": "D", "options": {"A": "团结互助合作共进", "B": "公平团结互助和谐", "C": "团结互爱和谐共进", "D": "平等团结互助和谐"}}, {"id": 46, "question": "以保障和改善民生为重点，解决好人民_____的利益问题，努力形成全体人民各尽其能、各得其所而又和谐相处的局面。", "answer": "C", "options": {"A": "最关心、最实际、最直接", "B": "最迫切、最实际、最关心", "C": "最关心、最直接、最现实", "D": "最直接、最实际、最关心"}}, {"id": 47, "question": "按照共同_____、共同_____的原则，努力形成全体人民各尽其能、各得其所而又和谐相处的局面。", "answer": "D", "options": {"A": "创造、享有", "B": "建设、享用", "C": "创造、享用", "D": "建设、享有"}}, {"id": 48, "question": "坚持马克思列宁主义的基本原理，走中国人民自愿选择的_____的道路，中国的社会主义事业必将取得最终的胜利。", "answer": "C", "options": {"A": "具有中国特色", "B": "符合历史发展", "C": "适合中国国情", "D": "符合社会规律"}}, {"id": 49, "question": "马克思列宁主义揭示了人类社会历史发展的规律，它的基本原理是正确的，具有强大的_____。", "answer": "B", "options": {"A": "发展空间", "B": "生命力", "C": "创新性", "D": "吸引力"}}, {"id": 50, "question": "中国共产党的最高理想和最终目标是_____。", "answer": "A", "options": {"A": "实现共产主义", "B": "实现共产主义社会制度", "C": "实现中国特色社会主义宏伟目标", "D": "实现全面建设小康社会"}}, {"id": 51, "question": "中国共产党执政兴国的第一要务是_____。", "answer": "C", "options": {"A": "改革", "B": "开放", "C": "发展", "D": "稳定"}}, {"id": 52, "question": "中国特色社会主义改革的实质是_____。", "answer": "B", "options": {"A": "理论创新", "B": "体制创新", "C": "知识创新", "D": "科技创新"}}, {"id": 53, "question": "中国共产党同一切剥削阶级政党的根本区别是_____。", "answer": "A", "options": {"A": "全心全意为人民服务，立党为公，执政为民", "B": "理论联系实际", "C": "解放思想、实事求是", "D": "独立自主、自力更生"}}, {"id": 54, "question": "决定一个政党、一个政权盛衰的根本因素是_____。", "answer": "C", "options": {"A": "政党制度", "B": "党的理论", "C": "人心向背", "D": "政权结构"}}, {"id": 55, "question": "党执政后的最大危险是_____。", "answer": "C", "options": {"A": "脱离党员", "B": "脱离阶级基础", "C": "脱离群众", "D": "脱离社会"}}, {"id": 56, "question": "社会主义民主的本质和核心是_____。", "answer": "B", "options": {"A": "共产党的领导", "B": "人民当家作主、一切权力属于人民", "C": "民主集中制", "D": "维护社会主义制度"}}, {"id": 57, "question": "我国的政体是_____。", "answer": "A", "options": {"A": "人民代表大会制", "B": "政治协商制度", "C": "人民民主专政", "D": "民族区域制度"}}, {"id": 58, "question": "社会主义的根本任务是_____。", "answer": "A", "options": {"A": "进一步解放和发展生产力", "B": "提高人民生活水平", "C": "加强党的建设", "D": "加强宏观调控"}}, {"id": 59, "question": "争取入党，首先要_____。", "answer": "A", "options": {"A": "积极主动地向党组织表达自己要求入党的愿望", "B": "积极主动地向党组织表达自己的学习的愿望", "C": "积极主动地向党组织表达自己生活的愿望", "D": "积极主动地向党组织表达自己奋斗的愿望"}}, {"id": 60, "question": "党的纪律是党的各级组织和全体党员必须遵守的______，是维护党的团结统一、完成党的任务的保证。", "answer": "A", "options": {"A": "行为规则", "B": "最高准则", "C": "行动准则", "D": "行为标准"}}, {"id": 61, "question": "如被劝告退党的党员坚持不退，应当提交支部大会讨论，决定把他除名，并报上级党组织_____。", "answer": "A", "options": {"A": "批准", "B": "备案", "C": "审批", "D": "归案"}}, {"id": 62, "question": "劝党员退党，应当经支部大会讨论决定，并报上级党组织_____。", "answer": "A", "options": {"A": "批准", "B": "备案", "C": "审批", "D": "归案"}}, {"id": 63, "question": "党员缺乏革命意志，不履行党员义务，不符合党员条件，党的支部应当对他进行教育，要求他限期改正；经教育仍无转变的，应当_____。", "answer": "B", "options": {"A": "把他除名", "B": "劝他退党", "C": "把他开除", "D": "留党察看"}}, {"id": 64, "question": "每个党员，不论职务高低，都必须编入党的一个支部、小组或其他特定组织，参加党的_____，接受党内外群众的监督。", "answer": "B", "options": {"A": "民主生活", "B": "组织生活", "C": "学习活动", "D": "实践活动"}}, {"id": 65, "question": "党员的党龄，从_____之日算起。", "answer": "A", "options": {"A": "预备期满转为正式党员", "B": "支部大会通过", "C": "预备期满", "D": "成为预备党员"}}, {"id": 66, "question": "预备党员的预备期，从_____他为预备党员之日算起。", "answer": "C", "options": {"A": "支部大会上报", "B": "支部大会讨论", "C": "支部大会通过", "D": "支委会通过"}}, {"id": 67, "question": "预备党员转为正式党员，或延长预备期，或取消预备党员资格，都应当经_____。", "answer": "A", "options": {"A": "支部大会讨论通过和上级党组织批准", "B": "有关党组织批准", "C": "支部大会讨论通过", "D": "支委会讨论决定"}}, {"id": 68, "question": "预备党员在预备期间，不履行党员义务，不具备党员条件的，应当_____资格。", "answer": "C", "options": {"A": "开除预备党员", "B": "保留预备党员", "C": "取消预备党员", "D": "审查预备党员"}}, {"id": 69, "question": "预备党员预备期满时，需要继续考察和教育的，可以延长预备期，但不能超过_____。", "answer": "B", "options": {"A": "半年", "B": "一年", "C": "一年半", "D": "两年"}}, {"id": 70, "question": "预备党员在预备期间，认真履行党员义务，具备党员条件的，应当_____转为正式党员。", "answer": "B", "options": {"A": "适时", "B": "按期", "C": "提前", "D": "准时"}}, {"id": 71, "question": "预备党员预备期满时，应由_____主动向党组织提出转为正式党员的申请。", "answer": "C", "options": {"A": "党支部书记", "B": "入党介绍人", "C": "本人", "D": "党支部组织委员"}}, {"id": 72, "question": "预备党员的权利，除了没有_____ 以外，也同正式党员一样。", "answer": "A", "options": {"A": "表决权、选举权和被选举权", "B": "表决权、被选举权", "C": "选举权、被选举权", "D": "被选举权"}}, {"id": 73, "question": "预备党员的义务同正式党员_____。", "answer": "C", "options": {"A": "基本相同", "B": "不一样", "C": "一样", "D": "基本一样"}}, {"id": 74, "question": "预备党员的预备期为_____。", "answer": "B", "options": {"A": "半年", "B": "一年", "C": "一年半", "D": "两年"}}, {"id": 75, "question": "预备党员必须面向_____ 进行入党宣誓。", "answer": "B", "options": {"A": "党徽", "B": "党旗", "C": "党组织", "D": "党的领导人"}}, {"id": 76, "question": "党的支部委员会对申请入党的人，要注意征求_____的意见，进行严格的审查，认为合格后再提交支部大会讨论。", "answer": "C", "options": {"A": "党内群众", "B": "党外有关群众", "C": "党内外有关群众", "D": "广大群众"}}, {"id": 77, "question": "申请入党的人，要填写入党志愿书，要有_____作介绍人，要经过支部大会通过和上级党组织批准，并且经过预备期的考察，才能成为正式党员。", "answer": "C", "options": {"A": "2名预备党员", "B": "3名正式党员", "C": "2名正式党员", "D": "1名正式党员"}}, {"id": 78, "question": "发展党员，必须把政治标准放在首位，经过党的支部，坚持_____的原则。", "answer": "B", "options": {"A": "少数发展", "B": "个别吸收", "C": "稳步发展", "D": "集体发展"}}, {"id": 79, "question": "端正入党动机是争取入党的_____。", "answer": "A", "options": {"A": "首要问题", "B": "根本问题", "C": "现实问题", "D": "次要问题"}}, {"id": 80, "question": "正确行使党员权利，有利于______实现党的正确领导。", "answer": "A", "options": {"A": "发扬党内民主", "B": "发扬党的优良作风", "C": "发扬党的优良传统", "D": "发扬党内政治"}}, {"id": 81, "question": "先进性是马克思主义政党的______。", "answer": "D", "options": {"A": "利益所系、力量所在", "B": "生命所系、发展所在", "C": "前途所系、力量所在", "D": "生命所系、力量所在"}}, {"id": 82, "question": "党员义务是党对党员的_____。", "answer": "D", "options": {"A": "特殊要求", "B": "一般要求", "C": "严格要求", "D": "基本要求"}}, {"id": 83, "question": "除了法律和政策规定范围内的个人利益和职权以外，所有共产党员不得＿＿。", "answer": "C", "options": {"A": "谋求任何利益和特权", "B": "谋求任何私利和人权", "C": "谋求任何私利和特权", "D": "谋求任何需求和特权"}}, {"id": 84, "question": "党必须适应形势的发展和情况的变化，完善领导体制，改进领导方式，增强_____。", "answer": "B", "options": {"A": "协调能力", "B": "执政能力", "C": "领导能力", "D": "创新能力"}}, {"id": 85, "question": "党必须实行民主的科学的决策，制定和执行正确的路线、方针、政策，做好党的_____，发挥全体党员的先锋模范作用。", "answer": "C", "options": {"A": "宣传群众和发动群众的工作", "B": "政治、思想和组织工作", "C": "组织工作和宣传教育工作", "D": "群众工作和干部工作"}}, {"id": 86, "question": "必须充分发扬党内民主，保障党员民主权利，发挥各级党组织和广大党员的_____。", "answer": "C", "options": {"A": "主动性创造性", "B": "积极性主动性", "C": "积极性创造性", "D": "民主性创造性"}}, {"id": 87, "question": "党风问题、党同人民群众联系问题是关系党_____的问题。", "answer": "B", "options": {"A": "兴衰成败", "B": "生死存亡", "C": "执政地位", "D": "执政能力"}}, {"id": 88, "question": "党在自己的工作中实行群众路线，_____，把党的正确主张变为群众的自觉行动。", "answer": "C", "options": {"A": "一切为了群众，一切依靠群众，发动群众，激励群众；", "B": "一切为了群众，一切依靠群众，相信群众的智慧和力量；", "C": "一切为了群众，一切依靠群众，从群众中来，到群众中去。", "D": "一切为了群众，一切依靠群众，关心群众，支持群众。"}}, {"id": 89, "question": "党在任何时候都把_____，同群众同甘共苦，保持最密切的联系，不允许任何党员脱离群众，凌驾于群众之上。", "answer": "B", "options": {"A": "党的利益放在第一位", "B": "群众利益放在第一位", "C": "干部利益放在第一位", "D": "生产放在第一位"}}, {"id": 90, "question": "党领导的中国特色社会主义伟大事业，要靠_____来保证。", "answer": "B", "options": {"A": "党的改革的新的伟大工程", "B": "党的建设的新的伟大工程", "C": "党的发展的新的伟大工程", "D": "党的创新的新的伟大工程"}}, {"id": 91, "question": "严格区分和正确处理_____和人民内部矛盾这两类不同性质的矛盾。", "answer": "A", "options": {"A": "敌我矛盾", "B": "对外矛盾", "C": "外部矛盾", "D": "对抗性矛盾"}}, {"id": 92, "question": "坚持马克思主义指导思想，培育和践行社会主义核心价值观，倡导社会主义荣辱观，增强民族_____精神。", "answer": "D", "options": {"A": "自爱、自尊和自强", "B": "自爱、自信和自尊", "C": "自尊、自爱和自强", "D": "自尊、自信和自强"}}, {"id": 93, "question": "坚持马克思主义指导思想，树立中国特色社会主义共同理想，弘扬以_____为核心的民族精神和以_____为核心的时代精神。", "answer": "A", "options": {"A": "爱国主义、改革创新", "B": "马列主义、科学发展", "C": "爱国主义、科学发展", "D": "马列主义、改革创新"}}, {"id": 94, "question": "_____是立国之本。", "answer": "B", "options": {"A": "科学技术", "B": "四项基本原则", "C": "提高全民素质", "D": "社会主义法制"}}, {"id": 95, "question": "中国共产党领导人民发展_____。", "answer": "B", "options": {"A": "社会主义民主思想", "B": "社会主义民主政治", "C": "社会主义民主意识", "D": "社会主义民主观念"}}, {"id": 96, "question": "发挥_____在资源配置中的决定性作用，更好发挥政府作用，建立完善的宏观调控体系。", "answer": "D", "options": {"A": "科技", "B": "政策", "C": "政府", "D": "市场"}}, {"id": 97, "question": "中国共产党领导人民发展_____。毫不动摇地巩固和发展公有制经济，毫不动摇地鼓励、支持、引导非公有制经济发展。", "answer": "D", "options": {"A": "社会主义政治", "B": "社会主义文化", "C": "社会主义经济", "D": "社会主义市场经济"}}, {"id": 98, "question": "我国社会主义的强国之路是坚持_____。", "answer": "B", "options": {"A": "科学执政", "B": "改革开放", "C": "民主执政", "D": "发展市场经济"}}, {"id": 99, "question": "发展是我们党_____的第一要务。", "answer": "B", "options": {"A": "以法治国", "B": "执政兴国", "C": "以德治国", "D": "执政为民"}}, {"id": 100, "question": "我国的社会主义建设，必须从我国的国情出发，走_____。", "answer": "C", "options": {"A": "社会主义道路", "B": "独立自主，自立更生的道路", "C": "中国特色社会主义道路", "D": "中国模式的社会主义道路"}}, {"id": 101, "question": "我国正处于并将长期处于社会主义初级阶段。这是在经济文化落后的中国建设社会主义现代化_____，需要上百年的时间。", "answer": "B", "options": {"A": "可以逾越的历史阶段", "B": "不可逾越的历史阶段", "C": "不得不逾越的历史阶段", "D": "可以不经过的历史阶段"}}, {"id": 102, "question": "马克思主义认为，人类社会的发展，是_____的结果。", "answer": "C", "options": {"A": "人和自然关系矛盾运动", "B": "人类和社会关系矛盾运动", "C": "生产力和生产关系矛盾运动", "D": "物质文明和精神文明推动"}}, {"id": 103, "question": "_____是实现社会主义现代化、创造人民美好生活的必由之路。", "answer": "A", "options": {"A": "中国特色社会主义道路", "B": "中国特色社会主义理论体系", "C": "中国特色社会主义制度", "D": "中国特色社会主义文化"}}, {"id": 104, "question": "_____是指导党和人民实现中华民族伟大复兴的正确理论。", "answer": "B", "options": {"A": "中国特色社会主义道路", "B": "中国特色社会主义理论体系", "C": "中国特色社会主义制度", "D": "中国特色社会主义文化"}}, {"id": 105, "question": "_____是当代中国发展进步的根本制度保障。", "answer": "C", "options": {"A": "中国特色社会主义道路", "B": "中国特色社会主义理论体系", "C": "中国特色社会主义制度", "D": "中国特色社会主义文化"}}, {"id": 106, "question": "_____是激励全党全国各族人民奋勇前进的强大精神力量。", "answer": "D", "options": {"A": "中国特色社会主义道路", "B": "中国特色社会主义理论体系", "C": "中国特色社会主义制度", "D": "中国特色社会主义文化"}}, {"id": 107, "question": "新时代中国特色社会主义思想，明确坚持和发展中国特色社会主义，总任务是实现社会主义现代化和中华民族伟大复兴，在全面建成小康社会的基础上，分____在本世纪中叶建成富强民主文明和谐美丽的社会主义现代化强国。", "answer": "A", "options": {"A": "两步走", "B": "三步走", "C": "四步走", "D": "五步走"}}, {"id": 108, "question": "新时代中国特色社会主义思想，明确中国特色社会主义最本质的特征是____。", "answer": "D", "options": {"A": "“五位一体”总体布局", "B": "建设中国特色社会主义法治体系", "C": "人民利益为根本出发点", "D": "中国共产党领导"}}, {"id": 109, "question": "综合分析国际国内形势和我国发展条件，从二〇二〇年到本世纪中叶可以分两个阶段来安排。第一个阶段，从______到______，在全面建成小康社会的基础上，再奋斗十五年，基本实现社会主义现代化。", "answer": "A", "options": {"A": "二〇二〇年　二〇三五年", "B": "二〇二五年　二〇四〇年", "C": "二〇三〇年　二〇四五年", "D": "二〇三五年　本世纪中叶"}}, {"id": 110, "question": "综合分析国际国内形势和我国发展条件，从二〇二〇年到本世纪中叶可以分两个阶段来安排。第二个阶段，从_____到_____，在基本实现现代化的基础上，再奋斗十五年，把我国建成富强民主文明和谐美丽的社会主义现代化强国。", "answer": "D", "options": {"A": "二〇二〇年　二〇三五年", "B": "二〇三五年　二〇五〇年", "C": "二〇三〇年　二〇四五年", "D": "二〇三五年　本世纪中叶"}}, {"id": 111, "question": "从全面建成小康社会到基本实现现代化，再到全面建成____，是新时代中国特色社会主义发展的战略安排。", "answer": "B", "options": {"A": "创新型国家", "B": "社会主义现代化强国", "C": "社会主义现代化大国", "D": "世界一流强国"}}, {"id": 112, "question": "我国经济已由______阶段转向______阶段，正处在转变发展方式、优化经济结构、转换增长动力的攻关期，建设现代化经济体系是跨越关口的迫切要求和我国发展的战略目标。", "answer": "C", "options": {"A": "高速增长　高水平发展", "B": "高速发展　高水平发展", "C": "高速增长　高质量发展", "D": "高速发展　高质量发展"}}, {"id": 113, "question": "贯彻新发展理念，建设现代化经济体系，必须坚持质量第一、效益优先，以_______为主线。", "answer": "C", "options": {"A": "转变发展方式", "B": "优化经济结构", "C": "供给侧结构性改革", "D": "转换增长动力"}}, {"id": 114, "question": "建设现代化经济体系，必须把发展经济的着力点放在______上，把提高供给体系质量作为主攻方向，显著增强我国经济质量优势。", "answer": "A", "options": {"A": "实体经济", "B": "共享经济", "C": "虚拟经济", "D": "国民经济"}}, {"id": 115, "question": "______是引领发展的第一动力，是建设现代化经济体系的战略支撑。", "answer": "B", "options": {"A": "改革", "B": "创新", "C": "开放", "D": "科技"}}, {"id": 116, "question": "推动形成全面开放新格局。要以_____建设为重点，坚持引进来和走出去并重，遵循共商共建共享原则，加强创新能力开放合作，形成陆海内外联动、东西双向互济的开放格局。", "answer": "C", "options": {"A": "“金砖机制”", "B": "自贸区", "C": "“一带一路”", "D": "区域合作"}}, {"id": 117, "question": "赋予自由贸易试验区更大改革自主权，探索建设______。", "answer": "C", "options": {"A": "自由贸易城", "B": "自由贸易区", "C": "自由贸易港", "D": "自由贸易市"}}, {"id": 118, "question": "坚持党的领导、人民当家作主、依法治国有机统一。_______是社会主义民主政治的本质特征。", "answer": "B", "options": {"A": "党的领导", "B": "人民当家作主", "C": "依法治国", "D": "政治体制改革"}}, {"id": 119, "question": "深化依法治国实践。成立中央全面______领导小组，加强对法治中国建设的统一领导。", "answer": "B", "options": {"A": "深化改革", "B": "依法治国", "C": "从严治党", "D": "司法改革"}}, {"id": 120, "question": "深化机构和行政体制改革。转变政府职能，深化简政放权，创新监管方式，增强政府公信力和执行力，建设人民满意的______政府。", "answer": "D", "options": {"A": "法治", "B": "创新型", "C": "廉洁", "D": "服务型"}}, {"id": 121, "question": "解决台湾问题、实现祖国完全统一，是全体中华儿女____，是中华民族____所在。", "answer": "D", "options": {"A": "一致愿望　根本利益", "B": "共同愿望　本质利益", "C": "一致愿望　本质利益", "D": "共同愿望　根本利益"}}, {"id": 122, "question": "______是两岸关系的政治基础。", "answer": "C", "options": {"A": "“九二共识”", "B": "反对态度", "C": "一个中国原则", "D": "和平统一"}}, {"id": 123, "question": "我们呼吁，各国人民同心协力，构建人类命运共同体，建设______的世界。", "answer": "C", "options": {"A": "持久和平、普遍安全、共同繁荣、开放包容、公平正义", "B": "持久和平、普遍安全、共同繁荣、公平正义、清洁美丽", "C": "持久和平、普遍安全、共同繁荣、开放包容、清洁美丽", "D": "持久和平、普遍安全、公平正义、开放包容、清洁美丽"}}, {"id": 124, "question": "深刻认识党面临的________的尖锐性和严峻性，坚持问题导向，保持战略定力，推动全面从严治党向纵深发展。", "answer": "A", "options": {"A": "精神懈怠危险、能力不足危险、脱离群众危险、消极腐败危险", "B": "精神懈怠危险、封闭僵化危险、脱离群众危险、消极腐败危险", "C": "精神懈怠危险、能力不足危险、官僚主义危险、消极腐败危险", "D": "精神懈怠危险、能力不足危险、脱离群众危险、腐化堕落危险"}}, {"id": 125, "question": "党的____是党的根本性建设，决定党的建设方向和效果。", "answer": "B", "options": {"A": "思想建设", "B": "政治建设", "C": "组织建设", "D": "制度建设"}}, {"id": 126, "question": "要尊崇党章，严格执行新形势下党内政治生活若干准则，增强党内政治生活的____。", "answer": "A", "options": {"A": "政治性、时代性、原则性、战斗性", "B": "思想性、政治性、时代性、原则性", "C": "政治性、思想性、时代性、原则性", "D": "政治性、思想性、时代性、战斗性"}}, {"id": 127, "question": "坚决防止和反对_________，坚决防止和反对宗派主义、圈子文化、码头文化，坚决反对搞两面派、做两面人。", "answer": "C", "options": {"A": "个人主义、享乐主义、自由主义、本位主义、好人主义", "B": "个人主义、分散主义、山头主义、本位主义、好人主义", "C": "个人主义、分散主义、自由主义、本位主义、好人主义", "D": "个人主义、分散主义、自由主义、本位主义、享乐主义"}}, {"id": 128, "question": "_____和_____，是中国共产党人的精神支柱和政治灵魂，也是保持党的团结统一的思想基础。", "answer": "B", "options": {"A": "共产主义远大理想　新时代中国特色社会主义共同理想", "B": "共产主义远大理想　中国特色社会主义共同理想", "C": "共产主义崇高理想　新时代中国特色社会主义共同理想", "D": "共产主义崇高理想　中国特色社会主义共同理想"}}, {"id": 129, "question": "要坚持党管干部原则，_____，把好干部标准落到实处。", "answer": "D", "options": {"A": "坚持立场坚定、素质过硬，坚持五湖四海、任人唯贤，坚持事业为上、公道正派", "B": "坚持德才兼备、以德为先，坚持立场坚定、素质过硬，坚持事业为上、公道正派", "C": "坚持德才兼备、以德为先，坚持五湖四海、任人唯贤，坚持立场坚定、素质过硬", "D": "坚持德才兼备、以德为先，坚持五湖四海、任人唯贤，坚持事业为上、公道正派"}}, {"id": 130, "question": "要以提升____为重点，突出政治功能，把企业、农村、机关、学校、科研院所、街道社区、社会组织等基层党组织建设成为宣传党的主张、贯彻党的决定、领导基层治理、团结动员群众、推动改革发展的坚强战斗堡垒。", "answer": "C", "options": {"A": "凝聚力", "B": "领导力", "C": "组织力", "D": "战斗力"}}, {"id": 131, "question": "要坚持无禁区、全覆盖、零容忍，坚持_______，坚持受贿行贿一起查，坚决防止党内形成利益集团。", "answer": "B", "options": {"A": "重预防、强高压、长震慑", "B": "重遏制、强高压、长震慑", "C": "重遏制、不减压、长震慑", "D": "重遏制、强高压、长威慑"}}, {"id": 132, "question": "新形势下加强和规范党内政治生活，重点是_____。", "answer": "C", "options": {"A": "党的各级代表大会代表", "B": "各级领导干部", "C": "各级领导机关和领导干部", "D": "各级领导机关"}}, {"id": 133, "question": "全党必须聚精会神抓好发展这个党执政兴国的第一要务，坚持以＿＿为中心的发展思想，统筹推进“五位一体”总体布局和协调推进“四个全面”战略布局。", "answer": "B", "options": {"A": "经济建设", "B": "人民", "C": "改革", "D": "创新"}}, {"id": 134, "question": "坚决维护_____、保证全党令行禁止，是党和国家前途命运所系，是全国各族人民根本利益所在。", "answer": "D", "options": {"A": "党的基本路线", "B": "党的领导", "C": "党规党纪", "D": "党中央权威"}}, {"id": 135, "question": "_____是党最根本、最重要的纪律，遵守党的_____是遵守党的全部纪律的基础。", "answer": "B", "options": {"A": "工作纪律", "B": "政治纪律", "C": "组织规律", "D": "群众规律"}}, {"id": 136, "question": "_____是党的生命，是党内政治生活积极健康的重要基础。", "answer": "D", "options": {"A": "党内教育", "B": "党内自由", "C": "党内团结", "D": "党内民主"}}, {"id": 137, "question": "党要管党、从严治党必须从______管起、严起。", "answer": "A", "options": {"A": "党内政治生活", "B": "党的民主生活", "C": "党的组织生活", "D": "党的基层工作"}}, {"id": 138, "question": "《关于新形势下党内政治生活的若干准则》明确规定，必须把_____作为开展党内政治生活的首要任务。", "answer": "A", "options": {"A": "坚定理想信念", "B": "严明党的纪律", "C": "加强党内民主", "D": "坚持民主集中制"}}, {"id": 139, "question": "_____是党内政治生活正常开展的重要制度保障。", "answer": "C", "options": {"A": "纪律严明", "B": "组织生活制", "C": "民主集中制", "D": "批评与自我批评"}}, {"id": 140, "question": "加强和规范党内政治生活，必须以_____为根本遵循。", "answer": "A", "options": {"A": "党章", "B": "法律", "C": "党内监督条例", "D": "宪法"}}, {"id": 141, "question": "加强和规范党内政治生活，关键是_____。", "answer": "B", "options": {"A": "各级领导机关和领导干部", "B": "高级干部", "C": "基层干部", "D": "全体干部"}}, {"id": 142, "question": "中国共产党人的精神支柱和政治灵魂是_____。", "answer": "D", "options": {"A": "马列主义", "B": "共产主义理想", "C": "中国特色社会主义共同理想", "D": "共产主义远大理想和中国特色社会主义共同理想"}}, {"id": 143, "question": "党内政治生活正常开展的根本保证是_____。", "answer": "A", "options": {"A": "党在社会主义初级阶段的基本路线", "B": "坚定理想信念", "C": "纪律严明", "D": "坚决维护党中央权威"}}, {"id": 144, "question": "加强和规范党内政治生活的重要目的是_____。", "answer": "A", "options": {"A": "坚决维护党中央权威、保证全党令行禁止", "B": "实现共产主义和中国特色社会主义", "C": "建设党内民主", "D": "为全党统一意志、统一行动提供保障。"}}, {"id": 145, "question": "加强和规范党内政治生活的根本要求是_____。", "answer": "D", "options": {"A": "坚决维护党中央权威、保证全党令行禁止", "B": "为全党统一意志、统一行动提供保障。", "C": "坚定理想信念", "D": "坚持全心全意为人民服务的根本宗旨、保持党同人民群众的血肉联系"}}, {"id": 146, "question": "加强和规范党内政治生活的重要举措是_____", "answer": "C", "options": {"A": "自律", "B": "批评和自我批评", "C": "监督", "D": "举报"}}, {"id": 147, "question": "执行党纪处分决定的机关或者受处分党员所在单位，应当在___内将处分决定的执行情况向作出或者批准处分决定的机关报告。", "answer": "B", "options": {"A": "三个月", "B": "六个月", "C": "九个月", "D": "一年"}}, {"id": 148, "question": "中国共产党是____诞生的。", "answer": "C", "options": {"A": "1919", "B": "1920", "C": "1921", "D": "1922"}}, {"id": 149, "question": "中华人民共和国建国后头三年的主要任务是____。", "answer": "B", "options": {"A": "没收官僚资本，进行土地改革", "B": "恢复国民经济", "C": "进行社会主义改造", "D": "发展市场经济"}}, {"id": 150, "question": "中国新民主主义革命伟大开端的标志是____。", "answer": "B", "options": {"A": "辛亥革命", "B": "五四运动", "C": "中国共产党的成立", "D": "南昌起义"}}, {"id": 151, "question": "我国最高权力机关是____。", "answer": "A", "options": {"A": "全国人民代表大会", "B": "中国人民政治协商会议", "C": "国务院", "D": "中央政治局"}}, {"id": 152, "question": "《告台湾同胞书》是以____的名义发布的。", "answer": "C", "options": {"A": "邓小平", "B": "江泽民", "C": "叶剑英", "D": "刘少奇"}}, {"id": 153, "question": "党在社会主义初级阶段的基本路线的核心是____。", "answer": "A", "options": {"A": "一个中心，两个基本点", "B": "以经济建设为中心", "C": "坚持四项基本原则，坚持改革开放", "D": "自力更生，艰苦奋斗"}}, {"id": 154, "question": "中华人民共和国成立时，中国共产党党员____。", "answer": "A", "options": {"A": "450万", "B": "340万", "C": "500万", "D": "600万"}}, {"id": 155, "question": "中华人民共和国成立后制定的第一部正式法律是____。", "answer": "A", "options": {"A": "《婚姻法》", "B": "《土地改革法》", "C": "《宪法》", "D": "《刑法》"}}, {"id": 156, "question": "中华人民共和国首次以五大国之一的身份参与讨论国际问题的会议是____。", "answer": "B", "options": {"A": "万隆会议", "B": "日内瓦会议", "C": "四国外长会议", "D": "华盛顿会议"}}, {"id": 157, "question": "社会主义制度在中国基本确立的时间是____。", "answer": "C", "options": {"A": "1949年", "B": "1953年", "C": "1956年", "D": "1957年"}}, {"id": 158, "question": "发展党员应坚持____原则。", "answer": "A", "options": {"A": "个别吸收", "B": "成批发展", "C": "突击发展", "D": "重点发展"}}, {"id": 159, "question": "党章规定，党的各级代表大会的代表和委员会的选举要采取____方式", "answer": "B", "options": {"A": "举手表决", "B": "无记名投票", "C": "记名投票", "D": "会议决定"}}, {"id": 160, "question": "党的全部工作和战斗力的基础是____。", "answer": "C", "options": {"A": "党中央", "B": "党的地方委员会", "C": "党的基层组织", "D": "党支部"}}, {"id": 161, "question": "社会主义改革的理论依据是____。", "answer": "A", "options": {"A": "社会主义社会基本矛盾运动的原理", "B": "阶级斗争理论", "C": "社会革命的理论", "D": "生产力与生产关系不平衡"}}, {"id": 162, "question": "马克思列宁主义揭示了____，它的基本原理是正确的，具有强大的生命力。", "answer": "C", "options": {"A": "人类改造客观世界的规律", "B": "社会主义和共产主义运动的规律", "C": "人类社会历史发展的规律", "D": "社会主义发展规律"}}, {"id": 163, "question": "在五千多年的发展中，中华民族形成了以____为核心的团结统一、爱好和平、勤劳勇敢、自强不息的伟大民族精神。", "answer": "C", "options": {"A": "集体主义", "B": "民族主义", "C": "爱国主义", "D": "改革创新"}}, {"id": 164, "question": "要建立与社会主义市场经济相适应、与____相协调、与中华民族传统美德相承接的社会主义思想道德体系。", "answer": "A", "options": {"A": "社会主义法律规范", "B": "中国的法律规范", "C": "现行的法律规范", "D": "人民的行为规范"}}, {"id": 165, "question": "坚持一个中国原则，是发展两岸关系和实现和平统一的基础。世界上只有一个中国，大陆和台湾同属一个中国，中国的___不容分割。", "answer": "A", "options": {"A": "主权和领土完整", "B": "主权和统一", "C": "统一和领土完整", "D": "统一和完整"}}, {"id": 166, "question": "要判断一个政党的性质是否先进，是不是工人阶级先锋队，主要应看它的____。", "answer": "B", "options": {"A": "阶级成分", "B": "理论和纲领", "C": "路线和方针", "D": "政策和方略"}}, {"id": 167, "question": "加强和改进党的建设，必须加强党的执政能力建设，提高党的____。", "answer": "C", "options": {"A": "抵御风险能力和水平", "B": "驾驭全局能力和水平", "C": "领导水平和执政水平", "D": "领导能力和统筹能力"}}, {"id": 168, "question": "推进党的作风建设核心是____。", "answer": "B", "options": {"A": "加大反腐倡廉力度", "B": "保持党同人民群众的血肉联系", "C": "严厉惩治腐败分子", "D": "加强巡视监管"}}, {"id": 169, "question": "坚决反对和防止腐败是全党一项重大的政治任务。不坚决惩治腐败，党同人民群众的血肉联系就会受到严重损害，就有丧失____的危险，就有可能走向自我毁灭。", "answer": "C", "options": {"A": "党的领导地位", "B": "党的执政基础", "C": "党的执政地位", "D": "党的领导基础"}}, {"id": 170, "question": "中国共产党党员是中国工人阶级的有____的先锋战士。", "answer": "B", "options": {"A": "社会主义觉悟", "B": "共产主义觉悟", "C": "共产主义理想", "D": "社会主义理想"}}, {"id": 171, "question": "预备党员必须面向党旗进行入党宣誓。誓词如下：我志愿加入中国共产党，拥护党的纲领，遵守党的章程，履行党员义务，____，严守党的纪律，保守党的秘密，对党忠诚，积极工作，为共产主义奋斗终身，随时准备为党和人民牺牲一切，永不叛党。", "answer": "A", "options": {"A": "执行党的决定", "B": "执行党的路线", "C": "执行党的政策", "D": "执行党的方略"}}, {"id": 172, "question": "党是根据自己的____，按照民主集中制组织起来的统一整体。", "answer": "C", "options": {"A": "理想和信念", "B": "目标和任务", "C": "纲领和章程", "D": "规章制度"}}, {"id": 173, "question": "党员受到警告处分____内，不得在党内提升职务和向党外组织推荐担任高于其原任职务的党外职务。", "answer": "B", "options": {"A": "六个月", "B": "一年", "C": "两年", "D": "三年"}}, {"id": 174, "question": "对信仰宗教的党员，应当加强思想教育，经党组织帮助教育仍没有转变的，应当劝其退党；劝而不退的，予以除名；参与利用宗教搞煽动活动的，给予____。", "answer": "D", "options": {"A": "警告或者严重警告处分", "B": "撤销党内职务或者留党察看处分", "C": "留党察看", "D": "开除党籍处分"}}, {"id": 175, "question": "借用管理和服务对象的钱款、住房、车辆等，影响公正执行公务，情节较重的，给予警告或者严重警告处分；情节严重的，给予____。", "answer": "A", "options": {"A": "撤销党内职务、留党察看或者开除党籍处分", "B": "撤销党内职务", "C": "留党察看", "D": "开除党籍处分"}}, {"id": 176, "question": "五四运动的导火线是____。", "answer": "C", "options": {"A": "第一次世界大战的爆发", "B": "1919年巴黎和会的召开", "C": "巴黎和会上中国外交的失败", "D": "学生被捕"}}, {"id": 177, "question": "习近平总书记指出，五四运动孕育了爱国、进步、民主、科学为主要内容的伟大五四精神，期核心是____。", "answer": "A", "options": {"A": "爱国主义", "B": "民族主义", "C": "国际主义", "D": "人文主义"}}, {"id": 178, "question": "1919年，新青年出版了一期由____主编的《马克思主义专号》。", "answer": "C", "options": {"A": "钱玄同", "B": "陈独秀", "C": "李大钊", "D": "毛泽东"}}, {"id": 179, "question": "习近平新时代中国特色社会主义思想明确，中国特色社会主义战略布局是______？", "answer": "A", "options": {"A": "四个全面", "B": "五位一体", "C": "四个自信", "D": "三个新常态"}}, {"id": 180, "question": "新时代坚持和发展中国特色社会主义根本立场是______？", "answer": "A", "options": {"A": "以人民为中心", "B": "以经济建设为中心", "C": "以人为本", "D": "依法治国"}}, {"id": 181, "question": "2020年1月30日，世卫组织发布新型冠状病毒感染肺炎疫情国际关注的______事件?", "answer": "B", "options": {"A": "一级卫生事件", "B": "突发公共卫生事件", "C": "全球性疫情", "D": "紧急公共卫生事件"}}, {"id": 182, "question": "展望二〇三五年，我国将基本实现____、____、____、____，建成现代化经济体系。", "answer": "A", "options": {"A": "新型工业化、信息化、城镇化、农业现代化", "B": "智能化、信息化、城市化、农业现代化", "C": "新型工业化、智能化、城市化、农业科技化", "D": "智能化、信息化、城镇化、农业科技化"}}, {"id": 183, "question": "坚持把解决好____问题作为全党工作重中之重，走中国特色社会主义乡村振兴道路，全面实施乡村振兴战略。", "answer": "B", "options": {"A": "金融", "B": "“三农”", "C": "城市化", "D": "贫困"}}, {"id": 184, "question": "要坚持实施区域重大战略、区域协调发展战略、_____，健全区域协调发展体制机制，完善新型城镇化战略，构建高质量发展的国土空间布局和支撑体系。", "answer": "A", "options": {"A": "主体功能区战略", "B": "区域一体化战略", "C": "都市圈战略", "D": "中心经济区战略"}}, {"id": 185, "question": "推动理想信念教育常态化制度化，加强党史、新中国史、_____、社会主义发展史教育。", "answer": "C", "options": {"A": "当代史", "B": "军史", "C": "改革开放史", "D": "近代史"}}, {"id": 186, "question": "实现“十四五”规划和二〇三五年远景目标，必须坚持党的____。", "answer": "B", "options": {"A": "全局领导", "B": "全面领导", "C": "全部领导", "D": "全方位领导"}}, {"id": 187, "question": "中国共产党第二十次全国代表大会会期为______。", "answer": "A", "options": {"A": "10月16日至10月22日", "B": "10月16日至10月23日", "C": "10月15日至10月22日", "D": "10月15日至10月23日"}}, {"id": 188, "question": "_____是党的二十大的一项重要任务。", "answer": "D", "options": {"A": "党的二十大代表选举工作", "B": "党的二十大相关工作网络征求意见", "C": "起草好党的二十大报告", "D": "对党章进行修改"}}, {"id": 189, "question": "在党的二十大代表产生过程中，各选举单位坚持自下而上、上下结合、反复酝酿、逐级遴选，充分听取基层党组织、党代会代表和广大党员的意见，全国基层党组织参与实现了全覆盖，党员参与率达到_____。", "answer": "A", "options": {"A": "99.50%", "B": "99.60%", "C": "99.70%", "D": "99.80%"}}, {"id": 190, "question": "中国共产党第二十次全国代表大会，是在全党全国各族人民迈上全面建设社会主义现代化国家新征程、向_____进军的关键时刻召开的一次十分重要的大会。", "answer": "D", "options": {"A": "中国特色社会主义新时代", "B": "全面建成小康社会目标", "C": "第一个百年奋斗目标", "D": "第二个百年奋斗目标"}}, {"id": 191, "question": "党的二十大主题是：高举中国特色社会主义伟大旗帜，全面贯彻新时代中国特色社会主义思想，弘扬伟大建党精神，自信自强、守正创新，踔厉奋发、勇毅前行，为全面建设_____、全面推进中华民族伟大复兴而团结奋斗。", "answer": "A", "options": {"A": "社会主义现代化国家", "B": "社会主义现代化强国", "C": "小康社会", "D": "法治中国"}}, {"id": 192, "question": "面对突如其来的新冠肺炎疫情，我们坚持人民至上、生命至上，坚持外防输入、内防反弹，坚持动态清零不动摇，开展抗击疫情_____，最大限度保护了人民生命安全和身体健康，统筹疫情防控和经济社会发展取得重大积极成果。", "answer": "A", "options": {"A": "人民战争、总体战、阻击战", "B": "人民战争、全面战、阻击战", "C": "总体战、全面战、阻击战", "D": "总体战、阻击战、整体战"}}, {"id": 193, "question": "面对国际局势急剧变化，特别是面对外部讹诈、遏制、封锁、极限施压，我们坚持国家利益为重、国内政治优先，保持战略定力，发扬斗争精神，展示不畏强权的坚定意志，在斗争中维护国家尊严和核心利益，牢牢掌握了我国_____主动权。", "answer": "A", "options": {"A": "发展和安全", "B": "发展", "C": "安全", "D": "战略和安全"}}, {"id": 194, "question": "2022年__________，中国共产党第二十次全国代表大会审议并一致通过十九届中央委员会提出的《中国共产党章程（修正案）》，决定这一修正案自通过之日起生效。", "answer": "C", "options": {"A": "10月16日", "B": "10月20日", "C": "10月22日", "D": "10月26日"}}, {"id": 195, "question": "党的二十大通过的新修改的《中国共产党章程》指出，在国际事务中，弘扬和平、发展、公平、正义、民主、自由的全人类共同价值，坚持正确义利观，维护我国的独立和主权，反对霸权主义和强权政治，维护世界和平，促进人类进步，推动构建人类命运共同体，推动建设持久和平、普遍安全、共同繁荣、开放包容、_____的世界。", "answer": "D", "options": {"A": "和谐美丽", "B": "和谐稳定", "C": "文明和谐", "D": "清洁美丽"}}, {"id": 196, "question": "二十大报告指出，加强实践锻炼、专业训练，注重在重大斗争中磨砺干部，增强干部推动高质量发展本领、____、防范化解风险本领。", "answer": "B", "options": {"A": "调查研究本领", "B": "服务群众本领", "C": "科学决策本领", "D": "改革攻坚本领"}}, {"id": 197, "question": "抓好____这个根本大计，健全培养选拔优秀年轻干部常态化工作机制，把到基层和艰苦地区锻炼成长作为年轻干部培养的重要途径。", "answer": "D", "options": {"A": "政治建设", "B": "干部培养", "C": "干部储备", "D": "后继有人"}}, {"id": 198, "question": "坚持严管和厚爱相结合，加强对干部全方位管理和经常性监督，落实____，激励干部敢于担当、积极作为。", "answer": "C", "options": {"A": "党管干部原则", "B": "《党员干部监督管理条例》", "C": "“三个区分开来”", "D": "奖惩并举制度"}}, {"id": 199, "question": "坚持____原则，坚持尊重劳动、尊重知识、尊重人才、尊重创造，实施更加积极、更加开放、更加有效的人才政策，引导广大人才爱党报国、敬业奉献、服务人民。", "answer": "C", "options": {"A": "党管干部原则", "B": "任人唯贤", "C": "党管人才", "D": "德才兼备"}}, {"id": 200, "question": "要健全____制度体系，扩大人民有序政治参与，保证人民依法实行民主选举、民主协商、民主决策、民主管理、民主监督。", "answer": "D", "options": {"A": "法律规范", "B": "总览全局协调各方", "C": "全过程人民民主", "D": "人民当家作主"}}, {"id": 201, "question": "把握好习近平新时代中国特色社会主义思想的世界观和方法论，要做到“六个必须坚持”，必须坚持人民至上，必须坚持自信自立，必须坚持守正创新，必须坚持问题导向，必须坚持_______，必须坚持胸怀天下。", "answer": "D", "options": {"A": "创新观念", "B": "创新思维", "C": "系统思维", "D": "系统观念"}}, {"id": 202, "question": "党的二十大是在全党全国各族人民迈上全面建设社会主义现代化国家新征程、向第二个百年奋斗目标进军的______，召开的一次十分重要的大会。", "answer": "B", "options": {"A": "紧急关头", "B": "关键时刻", "C": "重要时刻", "D": "重要节点"}}, {"id": 203, "question": "“一国两制”是中国特色社会主义的伟大创举，是香港、澳门回归后保持长期繁荣稳定的_____________。", "answer": "A", "options": {"A": "最佳制度安排", "B": "最优制度安排", "C": "最佳制度设计", "D": "最优制度设计"}}, {"id": 204, "question": "坚持把发展经济的着力点放在________上，推进新型工业化，加快建设制造强国、质量强国、航天强国、交通强国、网络强国、________。", "answer": "D", "options": {"A": "数字经济、信息强国", "B": "产业经济、智慧中国", "C": "工业经济、数字强国", "D": "实体经济、数字中国"}}, {"id": 205, "question": "增强党内政治生活______、时代性、______、战斗性，用好批评和自我批评武器，持续净化党内政治生态。", "answer": "C", "options": {"A": "政治性、针对性", "B": "革命性、原则性", "C": "政治性、原则性", "D": "严肃性、有效性"}}, {"id": 206, "question": "铸牢中华民族共同体意识，就是要引导各族人民牢固树立休戚与共、______、生死与共、______的共同体理念。", "answer": "B", "options": {"A": "荣辱与共、患难与共", "B": "荣辱与共、命运与共", "C": "患难与共、命运与共", "D": "安危与共、患难与共"}}, {"id": 207, "question": "坚持和加强党的全面领导，深入贯彻新时代党的建设总要求和新时代党的组织路线，大力弘扬伟大建党精神，大力弘扬长征精神和“坚定信念、______、______、团结统一”的遵义会议精神，永葆自我革命精神，不断提高党的政治领导力、思想引领力、群众组织力、社会号召力，以高质量党建引领高质量发展。", "answer": "A", "options": {"A": "坚持真理、独立自主", "B": "坚守理想、践行初心", "C": "坚守理想、独立自主", "D": "坚守理想、对党忠诚"}}, {"id": 208, "question": "全省上下要深入学习贯彻习近平总书记视察贵州重要讲话和对贵州工作重要指示精神，抢抓国发〔2022〕2号文件重大机遇，按照省第十三次党代会部署，坚持以______统揽全局，坚持一张蓝图绘到底，以高质量发展的步步推进赢得现代化建设的节节胜利。", "answer": "B", "options": {"A": "党的二十大精神", "B": "高质量发展", "C": "习近平总书记重要指示精神", "D": "脱贫攻坚"}}, {"id": 209, "question": "________战略布局，确立了新的历史条件下，党和国家各项工作的战略目标和战略举措，是我们党在新形势下治国理政的总方略。", "answer": "A", "options": {"A": "\"四个全面\"", "B": "\"五大发展理念\"", "C": "\"三严三实\"", "D": "\"两学一做\""}}, {"id": 210, "question": "完善党的自我革命制度规范体系，坚持________，以党章为根本，以民主集中制为核心，完善党内法规制度体系，增强党内法规权威性和执行力。", "answer": "C", "options": {"A": "依法治党、依规治党", "B": "依法管党、依规管党", "C": "制度治党、依规治党", "D": "制度管党、依规管党"}}, {"id": 211, "question": "习近平总书记指出：“经济建设是党的中心工作，意识形态工作是党的一项________的工作。”", "answer": "A", "options": {"A": "极端重要", "B": "极其重要", "C": "十分重要", "D": "重要"}}, {"id": 212, "question": "推动高质量发展，主定位是“________”。这是党中央、国务院赋予我省的全新战略定位。", "answer": "D", "options": {"A": "四新四化", "B": "守好发展和生态两条底线", "C": "新时代西部大开发", "D": "四区一高地"}}, {"id": 213, "question": "________是伟大斗争、伟大工程的题中应有之义是我们党坚持党的性质和宗旨的重要法宝，是我们党实现自我净化、自我完善、自我革新、自我提高的重要途径。", "answer": "B", "options": {"A": "加强党内制度管理、严肃党内政治生活", "B": "严肃党内政治生活、净化党内政治生态", "C": "加强党内制度管理、净化党内政治生态", "D": "严肃党内政治生活、统一党内理想目标"}}, {"id": 214, "question": "2023年6月召开的全国组织工作会议，用“十三个坚持”集中概括了习近平总书记关于党的建设的重要思想，深刻阐明了党的建设的________ 、科学布局、价值追求、重点任务。这是全党首次正式提出和系统阐述“习近平总书记关于党的建设的重要思想”，在马克思主义建党学说发展史和中国共产党党建史上具有标志性的里程碑意义。", "answer": "A", "options": {"A": "根本原则", "B": "基本原则", "C": "根本所在", "D": "根本思想"}}, {"id": 215, "question": "习近平总书记关于党的建设的重要思想，是习近平新时代中国特色社会主义思想的重要组成部分，是新时代党的建设理论发展和实践经验的科学总结，是马克思主义建党学说________的最新成果，是全面推进新时代党的建设新的伟大工程的根本遵循和行动指南。", "answer": "A", "options": {"A": "中国化时代化", "B": "中国式现代化", "C": "中国式", "D": "中国化"}}, {"id": 216, "question": "《党章》规定，中国共产党党员必须________，不惜牺牲个人的一切，为实现共产主义奋斗终身。", "answer": "A", "options": {"A": "全心全意为人民服务", "B": "坚持四项基本原则", "C": "先公后私、克己奉公", "D": "遵纪守法"}}, {"id": 217, "question": "________是中国共产党思想路线的核心。", "answer": "B", "options": {"A": "求真务实", "B": "实事求是", "C": "为人民服务", "D": "以人民为中心"}}, {"id": 218, "question": "________把习近平新时代中国特色社会主义思想确立为党必须长期坚持的指导思想并庄严地写入党章，实现了党的指导思想的与时俱进。", "answer": "C", "options": {"A": "党的十七大", "B": "党的十八大", "C": "党的十九大", "D": "党的二十大"}}, {"id": 219, "question": "党的领导是进一步全面深化改革、推进中国式现代化的________。", "answer": "C", "options": {"A": "最大优势", "B": "本质要求", "C": "根本保证", "D": "内在要求"}}, {"id": 220, "question": "________是中国式现代化的重大任务。", "answer": "C", "options": {"A": "城乡融合发展", "B": "健全城乡基层治理体系", "C": "在发展中保障和改善民生", "D": "不断满足人民对美好生活的向往"}}, {"id": 221, "question": "发展________人民民主是中国式现代化的本质要求。", "answer": "B", "options": {"A": "全覆盖", "B": "全过程", "C": "全方位", "D": "全链条"}}, {"id": 222, "question": "健全________培训特别是基本培训机制，强化专业训练和实践锻炼，全面提高干部现代化建设能力。", "answer": "D", "options": {"A": "标准化", "B": "多样化", "C": "专业化", "D": "常态化"}}, {"id": 223, "question": "以下哪项不属于党中央八项规定内容?", "answer": "C", "options": {"A": "改进调查研究", "B": "精简会议活动", "C": "加强公车管理", "D": "规范出访活动"}}, {"id": 224, "question": "中央八项规定要求，要改进调查研究，到基层调研要深入了解真实情况，总结经验、研究问题、（ ）、指导工作。", "answer": "A", "options": {"A": "解决困难", "B": "发现问题", "C": "听取意见", "D": "实地考察"}}, {"id": 225, "question": "以下哪一项不属于“十五五”时期经济社会发展必须遵循的原则是________", "answer": "B", "options": {"A": "坚持党的全面领导", "B": "坚持高速增长优先", "C": "坚持统筹发展和安全", "D": "坚持有效市场和有为政府相结合"}}, {"id": 226, "question": "“十五五”时期是基本实现社会主义现代化夯实基础、________的关键时期，在基本实现社会主义现代化进程中具有承前启后的重要地位。", "answer": "C", "options": {"A": "深化改革", "B": "接续奋进", "C": "全面发力", "D": "改革创新"}}, {"id": 227, "question": "教育强国建设的主要目标之一是，到________，教育强国建设取得重要阶段性成效，高质量教育体系初步形成。", "answer": "A", "options": {"A": "2027年", "B": "2030年", "C": "2032年", "D": "2035年"}}, {"id": 228, "question": "中共贵州省委十三届八次全会提出，强化科技创新支撑，引领发展新质生产力。深入贯彻落实教育强国、科技强国、人才强国战略，走________科技创新路子，提升科技创新体系整体效能，提高全社会研发经费投入强度，推动科技创新和产业创新深度融合，一体推进教育科技人才发展。", "answer": "A", "options": {"A": "产业依托型", "B": "技术驱动型", "C": "人才引领型", "D": "政策导向型"}}, {"id": 229, "question": "经党中央同意，在全党开展树立和践行正确政绩观学习教育。学习教育以县处级以上领导班子和领导干部特别是“一把手”为重点，于2026年________启动、________基本结束。", "answer": "A", "options": {"A": "春节假期后；7月底", "B": "春节假期后；8月底前", "C": "全国两会后；7月底", "D": "全国两会后；8月底前"}}], "multi": [{"id": 1, "question": "党的纪律是_____。", "answer": "B;C", "options": {"A": "党的领导干部必须遵守的行为规则", "B": "党的各级组织和全体党员必须遵守的行为规则", "C": "维护党的团结统一、完成党的任务的保证", "D": "维护党员权利，发展新党员的保障", "E": "", "F": ""}}, {"id": 2, "question": "党员_____，党支部应当对他进行教育，要求他限期改正；经教育仍无转变的，应当劝他退党。", "answer": "A;B;C", "options": {"A": "缺乏革命意志", "B": "不履行党员义务", "C": "不符合党员条件", "D": "不开展批评", "E": "", "F": ""}}, {"id": 3, "question": "党在任何时候都把群众利益放在第一位，同群众同甘共苦，保持最密切的联系，坚持_____，不允许任何党员脱离群众，凌驾于群众之上。", "answer": "B;C;D", "options": {"A": "居为民所想", "B": "权为民所用", "C": "情为民所系", "D": "利为民所谋", "E": "", "F": ""}}, {"id": 4, "question": "《党章》指出，要努力造成_____的生动活泼的政治局面。", "answer": "A;B;D", "options": {"A": "又有集中又有民主", "B": "又有纪律又有自由", "C": "又有集体又有个人", "D": "又有统一意志又有个人心情舒畅", "E": "", "F": ""}}, {"id": 5, "question": "按照_____的原则，发展我党同各国共产党和其他政党的关系。", "answer": "A;B;C;D", "options": {"A": "独立自主", "B": "完全平等", "C": "相互尊重", "D": "互不干涉内部事务", "E": "", "F": ""}}, {"id": 6, "question": "培养和造就千百万社会主义事业接班人，从组织上保证党的_____的贯彻落实。", "answer": "A;B;D", "options": {"A": "基本理论", "B": "基本路线", "C": "基本纲领", "D": "基本方略", "E": "", "F": ""}}, {"id": 7, "question": "新形势下，党面临_____的考验是长期的、复杂的、严峻的。", "answer": "A;B;C;D", "options": {"A": "执政", "B": "改革开放", "C": "市场经济", "D": "外部环境", "E": "", "F": ""}}, {"id": 8, "question": "全党必须牢记，只有_______党才能始终立于不败之地。", "answer": "B;D", "options": {"A": "开拓创新", "B": "植根人民", "C": "发展经济", "D": "造福人民", "E": "", "F": ""}}, {"id": 9, "question": "_______都要求我们党以改革创新精神全面推进党的建设新的伟大工程，全面提高党的建设科学化水平。", "answer": "A;B;D", "options": {"A": "形势的发展", "B": "事业的开拓", "C": "工作的需要", "D": "人民的期待", "E": "", "F": ""}}, {"id": 10, "question": "发扬党内民主要落实党员_______。", "answer": "A;B;C;D", "options": {"A": "知情权", "B": "参与权", "C": "选举权", "D": "监督权", "E": "", "F": ""}}, {"id": 11, "question": "民主集中制是_____。", "answer": "A;C", "options": {"A": "党的根本组织原则", "B": "党的工作方法", "C": "党的群众路线在党的生活中的运用", "D": "党的思想路线在党的生活中的运用", "E": "", "F": ""}}, {"id": 12, "question": "全党要用_____统一思想。", "answer": "A;B;C;D", "options": {"A": "邓小平理论", "B": "习近平新时代中国特色社会主义思想", "C": "“三个代表”重要思想、科学发展观", "D": "党的基本路线", "E": "", "F": ""}}, {"id": 13, "question": "中国特色社会主义政治制度内容有 _______。", "answer": "A;B;C;D", "options": {"A": "人民代表大会制度", "B": "中国共产党领导的多党合作和政治协商制度", "C": "民族区域自治制度", "D": "基层群众自治制度", "E": "", "F": ""}}, {"id": 14, "question": "党员干部必须做到自重 、______，反对形式主义、官僚主义、享乐主义和奢靡之风，反对任何滥用职权、谋求私利的行为。", "answer": "B;C;D", "options": {"A": "自信", "B": "自省", "C": "自警", "D": "自励", "E": "", "F": ""}}, {"id": 15, "question": "中国共产党党员的基本条件_____。", "answer": "A;B;C;D", "options": {"A": "中国工人阶级的有共产主义觉悟的先锋战士", "B": "必须全心全意为人民服务，不惜牺牲个人的一切，为实现共产主义奋斗终身", "C": "永远是劳动人民的普通一员", "D": "除了法律和政策规定范围内的个人利益和工作职权以外，所有共产党员都不得谋求任何私利和特权", "E": "", "F": ""}}, {"id": 16, "question": "申请入党需要具备哪些条件_____。", "answer": "A;B;C;D", "options": {"A": "年满十八岁的中国工人、农民、军人、知识分子和其他社会阶层的先进分子", "B": "承认党的纲领和章程", "C": "执行党的决议和按期交纳党费", "D": "愿意参加党的一个组织并在其中积极工作", "E": "", "F": ""}}, {"id": 17, "question": "党要适应改革开放和社会主义现代化建设的要求，坚持_____，加强和改善党的领导。", "answer": "A;B;D", "options": {"A": "科学执政", "B": "民主执政", "C": "公平执政", "D": "依法执政", "E": "", "F": ""}}, {"id": 18, "question": "坚持马克思主义指导思想，努力使我国人民成为_____的人民。", "answer": "A;B;C;D", "options": {"A": "有道德", "B": "有理想", "C": "有纪律", "D": "有文化", "E": "", "F": ""}}, {"id": 19, "question": "广开言路，建立健全_____的制度和程序。", "answer": "A;B;C;D;E", "options": {"A": "民主选举", "B": "民主协商", "C": "民主决策", "D": "民主管理", "E": "民主监督", "F": ""}}, {"id": 20, "question": "构建社会主义和谐社会的总要求是：", "answer": "A;B;D", "options": {"A": "民主法治、公平正义；", "B": "诚信友爱、充满活力；", "C": "老有所养、病有所医；", "D": "安定有序、人与自然和谐相处。", "E": "", "F": ""}}, {"id": 21, "question": "坚持_____有机统一，走中国特色社会主义政治发展道路。", "answer": "A;C;D", "options": {"A": "党的领导", "B": "科学发展", "C": "人民当家作主", "D": "依法治国", "E": "", "F": ""}}, {"id": 22, "question": "各项工作总的出发点和检验标准主要看是否_____ 。", "answer": "A;B;C", "options": {"A": "有利于发展社会主义社会的生产力；", "B": "有利于增强社会主义国家的综合国力；", "C": "有利于提高人民的生活水平；", "D": "有得于构建社会主义和谐社会。", "E": "", "F": ""}}, {"id": 23, "question": "全党同志要高举中国特色社会主义伟大旗帜，为实现_____这三大历史任务而奋斗。", "answer": "B;C;D", "options": {"A": "全面建设小康", "B": "完成祖国统一", "C": "维护世界和平与促进共同发展", "D": "推进现代化建设", "E": "", "F": ""}}, {"id": 24, "question": "党的思想路线的内容包括_____。", "answer": "A;B;C;D", "options": {"A": "坚持一切从实际出发", "B": "理论联系实际", "C": "实事求是", "D": "在实践中检验真理和发展真理", "E": "", "F": ""}}, {"id": 25, "question": "社会主义初级阶段的含义是_____。", "answer": "A;D", "options": {"A": "我国社会已经是社会主义社会", "B": "实现了工业化、经济的社会化、市场化和现代化的社会", "C": "任何国家进入社会主义都要经历的起始阶段", "D": "我国的社会主义还处于初级阶段，不是实现了现代化的成熟的社会主义", "E": "", "F": ""}}, {"id": 26, "question": "社会主义本质的内容是_____。", "answer": "A;B;C;D", "options": {"A": "解放生产力、发展生产力", "B": "消灭剥削", "C": "消除两极分化", "D": "最终达到共同富裕", "E": "", "F": ""}}, {"id": 27, "question": "端正人党动机的主要途径是_____。", "answer": "A;B;C", "options": {"A": "认真学习马克思主义理论，确立正确的入党动机", "B": "加强主观世界改造，克服不正确的入党动机", "C": "通过实践锻炼，不断端正入党动机", "D": "在生活中自然形成正确的入党动机", "E": "", "F": ""}}, {"id": 28, "question": "对于要求入党的同志来说，端正入党动机非常重要_____。", "answer": "B;C", "options": {"A": "树立正确的入党动机，才能经受住部门领导的考验", "B": "正确的入党动机，是正确行动的精神力量", "C": "树立正确的入党动机，才能经受住党组织的考验", "D": "树立正确的入党动机，才能经受住生活的考验", "E": "", "F": ""}}, {"id": 29, "question": "正确的入党动机的内涵是_____。", "answer": "A;B;C", "options": {"A": "要有为共产主义和中国特色社会主义事业奋斗终身的坚定信念", "B": "要有全心全意为人民服务的思想", "C": "要有在生产、工作、学习和社会生活中起先锋模范作用的觉悟", "D": "要有攀登科学技术高峰的思想和决心", "E": "", "F": ""}}, {"id": 30, "question": "党员向党的上级组织直至中央提出_____，并要求有关组织给以负责的答复。", "answer": "A;B", "options": {"A": "请求", "B": "申诉和控告", "C": "上诉", "D": "申辩", "E": "", "F": ""}}, {"id": 31, "question": "党员对党的决议和政策如有不同意见，_____ ，并且可以把自己的意见向党的上级组织直至中央提出。", "answer": "A;B", "options": {"A": "在坚决执行的前提下", "B": "可以声明保留", "C": "可以不执行", "D": "可以反对", "E": "", "F": ""}}, {"id": 32, "question": "党员有权___________。", "answer": "A;B;D", "options": {"A": "接受党的教育和培训", "B": "阅读党的有关文件", "C": "接受党的教育和考察", "D": "参加党的有关会议", "E": "", "F": ""}}, {"id": 33, "question": "中国共产党党员的基本条件是_____。", "answer": "A;B;C", "options": {"A": "是中国工人阶级的有共产主义觉悟的先锋战士；", "B": "必须全心全意为人民服务，不惜牺牲个人的一切，为实现共产主义奋斗终身；", "C": "永远是劳动人民的普通一员。除了法律和政策规定范围内的个人利益和工作职权以外，所有共产党员都不得谋求任何私利和特权；", "D": "是先进工作者和劳动模范。", "E": "", "F": ""}}, {"id": 34, "question": "毛泽东同志在党的七大上第一次概括了我们党的“三大作风”是_______________。", "answer": "A;B;C", "options": {"A": "理论联系实践", "B": "密切联系群众", "C": "批评与自我批评", "D": "实事求是", "E": "", "F": ""}}, {"id": 35, "question": "党的历史方位的变化，要求我们党必须改革和完善领导方式和执政方式，坚持_____不断提高执政能力。", "answer": "A;B;C", "options": {"A": "科学执政", "B": "民主执政", "C": "依法执政", "D": "强化执政", "E": "", "F": ""}}, {"id": 36, "question": "发展社会主义市场经济，要_____。", "answer": "A;B", "options": {"A": "毫不动摇地巩固和发展公有制经济", "B": "毫不动摇地鼓励、支持、引导非公有制经济发展", "C": "毫不动摇地坚持改革开放", "D": "毫不动摇地发展社会主义民主", "E": "", "F": ""}}, {"id": 37, "question": "发展中国特色社会主义的政治，就是在中国共产党领导下，在人民当家作主的基础上_____。", "answer": "B;C", "options": {"A": "发展社会主义文化", "B": "依法治国", "C": "发展社会主义民主政治", "D": "发展科学技术", "E": "", "F": ""}}, {"id": 38, "question": "我们实行的改革是全面改革，是在坚持社会主义基本制度的前提下，自觉调整_____和_____的各个方面和环节，以适应社会主义初级阶段生产力发展水平和实现现代化的要求。", "answer": "B;C", "options": {"A": "生产方式", "B": "生产关系", "C": "上层建筑", "D": "经济基础", "E": "", "F": ""}}, {"id": 39, "question": "在社会主义初级阶段必须坚持党的基本理论的理由是___。", "answer": "A;D", "options": {"A": "这是由我国的社会性质决定的", "B": "这是由我国的经济决定的", "C": "这是由我国的政治决定的", "D": "这是由我们党的执政地位决定的", "E": "", "F": ""}}, {"id": 40, "question": "党内监督体系包括党委(党组)全面监督，以及_____。", "answer": "A;B;C;D", "options": {"A": "纪律检查机关专责监督", "B": "党的工作部门职能监督", "C": "党的基层组织日常监督", "D": "党员民主监督的党内监督体系", "E": "", "F": ""}}, {"id": 41, "question": "在新的历史条件下，我们党面临的“四大考验”是：_______。", "answer": "A;B;C;D", "options": {"A": "执政考验", "B": "改革开放考验", "C": "市场经济考验", "D": "外部环境考验", "E": "", "F": ""}}, {"id": 42, "question": "全党必须自觉防止和反对_______。对党中央决策部署，任何党组织和任何党员都不准合意的执行、不合意的不执行，不准先斩后奏，更不准口是心非、阳奉阴违。", "answer": "A;B;C;D", "options": {"A": "个人主义", "B": "分散主义", "C": "自由主义", "D": "本位主义", "E": "", "F": ""}}, {"id": 43, "question": "“三会一课”中的“三会”是指 _______。", "answer": "A;B;D", "options": {"A": "支部党员大会", "B": "支部委员会", "C": "民主生活会", "D": "党小组会", "E": "", "F": ""}}, {"id": 44, "question": "全党同志一定要永远与人民____、____、____，永远把人民对美好生活的向往作为奋斗目标，以永不懈怠的精神状态和一往无前的奋斗姿态，继续朝着实现中华民族伟大复兴的宏伟目标奋勇前进。", "answer": "A;B;D", "options": {"A": "同呼吸", "B": "共命运", "C": "手牵手", "D": "心连心", "E": "", "F": ""}}, {"id": 45, "question": "科学立法、严格执法、公正司法、全民守法深入推进，____、____、____建设相互促进，中国特色社会主义法治体系日益完善，全社会法治观念明显增强。", "answer": "B;C;D", "options": {"A": "法治生活", "B": "法治国家", "C": "法治政府", "D": "法治社会", "E": "", "F": ""}}, {"id": 46, "question": "引导应对气候变化国际合作，成为全球生态文明建设的重要____、____、____。", "answer": "A;B;C", "options": {"A": "参与者", "B": "贡献值", "C": "引领者", "D": "领导者", "E": "", "F": ""}}, {"id": 47, "question": "出台中央八项规定，严厉整治____、____、____和____，坚决反对特权。", "answer": "A;B;C;D", "options": {"A": "形式主义", "B": "官僚主义", "C": "享乐主义", "D": "奢靡之风", "E": "个人主义", "F": ""}}, {"id": 48, "question": "全党要更加自觉地增强____、____、____、____，既不走封闭僵化的老路，也不走改旗易帜的邪路，保持政治定力，坚持实干兴邦，始终坚持和发展中国特色社会主义。", "answer": "A;B;C;D", "options": {"A": "道路自信", "B": "理论自信", "C": "制度自信", "D": "文化自信", "E": "思想自信", "F": ""}}, {"id": 49, "question": "新时代中国特色社会主义思想，是_____，必须长期坚持并不断发展。", "answer": "A;B;C;D;E", "options": {"A": "对马克思列宁主义、毛泽东思想、邓小平理论、“三个代表”重要思想、科学发展观的继承和发展", "B": "马克思主义中国化最新成果", "C": "党和人民实践经验和集体智慧的结晶", "D": "中国特色社会主义理论体系的重要组成部分", "E": "全党全国人民为实现中华民族伟大复兴而奋斗的行动指南", "F": ""}}, {"id": 50, "question": "新时代坚持和发展中国特色社会主义的基本方略是____。", "answer": "A;B;C;D;E", "options": {"A": "坚持党对一切工作的领导，坚持以人民为中心，坚持全面深化改革", "B": "坚持新发展理念，坚持人民当家作主，坚持全面依法治国", "C": "坚持社会主义核心价值体系，坚持在发展中保障和改善民生，坚持人与自然和谐共生", "D": "坚持总体国家安全观，坚持党对人民军队的绝对领导，坚持“一国两制”和推进祖国统一", "E": "坚持推动构建人类命运共同体，坚持全面从严治党", "F": ""}}, {"id": 51, "question": "党政军民学，东西南北中，党是领导一切的。必须增强____，自觉维护党中央权威和集中统一领导，自觉在思想上政治上行动上同党中央保持高度一致。", "answer": "A;B;C;D", "options": {"A": "政治意识", "B": "大局意识", "C": "核心意识", "D": "看齐意识", "E": "纪律意识", "F": ""}}, {"id": 52, "question": "巩固和发展爱国统一战线。坚持______，支持民主党派按照中国特色社会主义参政党要求更好履行职能。", "answer": "A;B;C;D", "options": {"A": "长期共存", "B": "互相监督", "C": "肝胆相照", "D": "荣辱与共", "E": "", "F": ""}}, {"id": 53, "question": "保持香港、澳门长期繁荣稳定，必须全面准确贯彻____的方针。", "answer": "A;B;C;D", "options": {"A": "“一国两制”", "B": "“港人治港”", "C": "“澳人治澳”", "D": "高度自治", "E": "", "F": ""}}, {"id": 54, "question": "要支持香港、澳门融入国家发展大局，以____、____、____等为重点，全面推进内地同香港、澳门互利合作。", "answer": "A;B;D", "options": {"A": "粤港澳大湾区建设", "B": "粤港澳合作", "C": "粤港澳政府合作", "D": "泛珠三角区域合作", "E": "", "F": ""}}, {"id": 55, "question": "中国将高举___、___、___、___的旗帜，恪守维护世界和平、促进共同发展的外交政策宗旨。", "answer": "A;B;C;D", "options": {"A": "和平", "B": "发展", "C": "合作", "D": "共赢", "E": "互惠", "F": ""}}, {"id": 56, "question": "坚定不移在和平共处五项原则基础上发展同各国的友好合作，推动建设____、____、____的新型国际关系。", "answer": "A;B;D", "options": {"A": "相互尊重", "B": "公平正义", "C": "互不干涉", "D": "合作共赢", "E": "", "F": ""}}, {"id": 57, "question": "世界正处于大发展大变革大调整时期，和平与发展仍然是时代主题。____、____、____、____深入发展。", "answer": "A;B;C;D", "options": {"A": "世界多极化", "B": "经济全球化", "C": "社会信息化", "D": "文化多样化", "E": "治理民主化", "F": ""}}, {"id": 58, "question": "积极促进“一带一路”国际合作，努力实现____________________，打造国际合作新平台，增添共同发展新动力。", "answer": "A;B;C;D;E", "options": {"A": "政策沟通", "B": "设施联通", "C": "贸易畅通", "D": "资金融通", "E": "民心相通", "F": ""}}, {"id": 59, "question": "新时代党的建设总要求是____________。", "answer": "A;B;C;D;E", "options": {"A": "坚持和加强党的全面领导，坚持党要管党、全面从严治党", "B": "以加强党的长期执政能力建设、先进性和纯洁性建设为主线，以党的政治建设为统领，以坚定理想信念宗旨为根基，以调动全党积极性、主动性、创造性为着力点", "C": "全面推进党的政治建设、思想建设、组织建设、作风建设、纪律建设", "D": "把制度建设贯穿其中，深入推进反腐败斗争，不断提高党的建设质量", "E": "把党建设成为始终走在时代前列、人民衷心拥护、勇于自我革命、经得起各种风浪考验、朝气蓬勃的马克思主义执政党", "F": ""}}, {"id": 60, "question": "领导十三亿多人的社会主义大国，我们党既要政治过硬，也要本领高强。要______。", "answer": "A;B;C;D", "options": {"A": "增强学习本领，增强政治领导本领", "B": "增强改革创新本领，增强科学发展本领", "C": "增强依法执政本领，增强群众工作本领", "D": "增强狠抓落实本领，增强驾驭风险本领", "E": "", "F": ""}}, {"id": 61, "question": "以____________________，把党内和党外、国内和国外各方面优秀人才集聚到党和人民的伟大奋斗中来。", "answer": "A;B;C;D;E", "options": {"A": "识才的慧眼", "B": "爱才的诚意", "C": "用才的胆识", "D": "容才的雅量", "E": "聚才的良方", "F": ""}}, {"id": 62, "question": "青年兴则国家兴，青年强则国家强。青年一代____、____、____，国家就有前途，民族就有希望。", "answer": "B;C;D", "options": {"A": "有品德", "B": "有理想", "C": "有本领", "D": "有担当", "E": "", "F": ""}}, {"id": 63, "question": "全党全国各族人民要紧密团结在党中央周围，高举中国特色社会主义伟大旗帜，锐意进取，埋头苦干，为实现推进现代化建设、完成祖国统一、维护世界和平与促进共同发展三大历史任务，为___________继续奋斗！", "answer": "A;B;D;E", "options": {"A": "决胜全面建成小康社会", "B": "夺取新时代中国特色社会主义伟大胜利", "C": "全面建成社会主义现代化强国", "D": "实现中华民族伟大复兴的中国梦", "E": "实现人民对美好生活的向往", "F": ""}}, {"id": 64, "question": "全党必须坚决反对形式主义、官僚主义、享乐主义和奢靡之风，领导干部特别是高级干部要以身作则。反对“四风”，重在解决以下问题：_____。", "answer": "A;B;C;D", "options": {"A": "反对形式主义，重在解决作风飘浮、工作不实，文山会海、表面文章，贪图虚名、弄虚作假等问题", "B": "反对官僚主义，重在解决脱离实际、脱离群众，消极应付、推诿扯皮，作风霸道、迷恋特权等问题", "C": "反对享乐主义，重在解决追名逐利、贪图享受，讲究排场、玩物丧志等问题", "D": "反对奢靡之风，重在解决铺张浪费、挥霍无度，骄奢淫逸、腐化堕落等问题", "E": "", "F": ""}}, {"id": 65, "question": "各级党委(党组)必须坚持集体领导制度。凡属重大问题，要按照_____的原则，由集体讨论、按少数服从多数作出决定，不允许用其他形式取代党委及其常委会(或党组)的领导。", "answer": "A;B;D;E", "options": {"A": "集体领导", "B": "民主集中", "C": "投票表决", "D": "会议决定", "E": "个别酝酿", "F": ""}}, {"id": 66, "question": "必须尊重党员主体地位、保障党员民主权利，落实党员_____，保障全体党员平等享有党章规定的党员权利、履行党章规定的党员义务。", "answer": "A;B;D;E", "options": {"A": "知情权", "B": "参与权", "C": "劳动权", "D": "监督权", "E": "选举权", "F": ""}}, {"id": 67, "question": "《关于新形势下党内政治生活的若干准则》明确规定，选拔任用干部必须_____，把公道正派作为干部工作核心理念贯穿选人用人全过程，做到公道对待干部、公平评价干部、公正使用干部。", "answer": "A;B;C;D", "options": {"A": "坚持党章规定的干部条件", "B": "坚持德才兼备、以德为先", "C": "坚持五湖四海、任人唯贤", "D": "坚持信念坚定、为民服务、勤政务实、敢于担当、清正廉洁的好干部标准。", "E": "", "F": ""}}, {"id": 68, "question": "坚持“三会一课”制度，指的是党员必须参加_____，党支部要定期召开支部委员会会议。", "answer": "A;C;D", "options": {"A": "党员大会", "B": "中心组学习（扩大）会", "C": "上党课", "D": "党小组会", "E": "", "F": ""}}, {"id": 69, "question": "批评和自我批评必须坚持“团结——批评——团结”，按照“_____”的要求，严肃认真提意见，满腔热情帮同志，决不能把自我批评变成自我表扬、把相互批评变成相互吹捧。", "answer": "A;B;C;D", "options": {"A": "照镜子", "B": "正衣冠", "C": "洗洗澡", "D": "治治病", "E": "", "F": ""}}, {"id": 70, "question": "新形势下加强和规范党内政治生活，必须以党章为根本遵循，坚持党的政治路线、思想路线、组织路线、群众路线，着力_____，努力在全党形成又有集中又有民主、又有纪律又有自由、又有统一意志又有个人心情舒畅生动活泼的政治局面。", "answer": "A;B;C;D", "options": {"A": "增强党内政治生活的政治性、时代性、原则性、战斗性", "B": "增强党自我净化、自我完善、自我革新、自我提高能力", "C": "提高党的领导水平和执政水平、增强拒腐防变和抵御风险能力", "D": "维护党中央权威、保证党的团结统一、保持党的先进性和纯洁性", "E": "", "F": ""}}, {"id": 71, "question": "坚持党的领导，首先是坚持党中央的集中统一领导。全党必须牢固树立_____，自觉在思想上政治上行动上同党中央保持高度一致。", "answer": "A;B;C;D", "options": {"A": "大局意识", "B": "核心意识", "C": "看齐意识", "D": "政治意识", "E": "", "F": ""}}, {"id": 72, "question": "领导干部特别是高级干部必须注重_____，教育管理好亲属和身边工作人员。", "answer": "B;C;D", "options": {"A": "家训", "B": "家庭", "C": "家教", "D": "家风", "E": "", "F": ""}}, {"id": 73, "question": "新形势下加强和规范党内政治生活，必须坚持党的_____。", "answer": "A;B;C;D", "options": {"A": "政治路线", "B": "思想路线", "C": "组织路线", "D": "群众路线", "E": "基本路线", "F": ""}}, {"id": 74, "question": "_____是中国共产党人的精神支柱和政治灵魂，也是保持党的团结统一的思想基础。", "answer": "B;D", "options": {"A": "构建和谐社会", "B": "共产主义远大理想", "C": "全面建成小康社会", "D": "中国特色社会主义共同理想", "E": "", "F": ""}}, {"id": 75, "question": "《关于新形势下党内政治生活的若干准则》明确规定，必须严明党的纪律，坚持_____，党内决不允许存在不受纪律约束的特殊组织和特殊党员。", "answer": "B;C;D", "options": {"A": "纪律学习不放松", "B": "纪律面前一律平等", "C": "遵守纪律没有特权", "D": "执行纪律没有例外", "E": "", "F": ""}}, {"id": 76, "question": "_____是加强和规范党内政治生活的重要任务。", "answer": "A;B", "options": {"A": "建设廉洁政治", "B": "坚决反对腐败", "C": "坚定理想信念", "D": "维护中央权威", "E": "", "F": ""}}, {"id": 77, "question": "新形势下，党内政治生活状况总体是好的。同时，一个时期以来，党内政治生活中也出现了一些突出问题，其中有_______。", "answer": "A;B;C;D", "options": {"A": "脱离群众", "B": "好人主义", "C": "山头主义", "D": "对党不忠诚", "E": "", "F": ""}}, {"id": 78, "question": "以下哪些属于党内错误政治生活的不良影响_______。", "answer": "A;B;C;D", "options": {"A": "严重侵蚀党的思想道德基础", "B": "严重破坏党的团结和集中统一", "C": "严重损害党内政治生态和党的形象", "D": "严重影响党和人民事业发展", "E": "", "F": ""}}, {"id": 79, "question": "为更好进行具有许多新的历史特点的伟大斗争、推进党的建设新的伟大工程、推进中国特色社会主义伟大事业，经受“四大考验”、克服“四种危险”，有必要制定一部新形势下党内政治生活的准则.“四大考验”是_______。", "answer": "A;B;C;D", "options": {"A": "执政考验", "B": "改革开放考验", "C": "市场经济考验", "D": "外部环境考验", "E": "市场经验考验", "F": "生态环境考验"}}, {"id": 80, "question": "为更好进行具有许多新的历史特点的伟大斗争、推进党的建设新的伟大工程、推进中国特色社会主义伟大事业，经受“四大考验”、克服“四种危险”，有必要制定一部新形势下党内政治生活的准则。“四种危险”是_______。", "answer": "A;B;C;D", "options": {"A": "精神懈怠的危险", "B": "能力不足的危险", "C": "脱离群众的危险", "D": "消极腐败的危险", "E": "", "F": ""}}, {"id": 81, "question": "新形势下加强和规范党内政治生活，要着力增强党的_____能力。", "answer": "A;B;C;D", "options": {"A": "自我净化", "B": "自我完善", "C": "自我革新", "D": "自我提高", "E": "自我批评", "F": ""}}, {"id": 82, "question": "新形势下加强和规范党内政治生活，要着力提高党的领导水平和执政水平、增强拒腐防变和抵御风险能力，着力维护党中央权威、保证党的团结统一、保持党的先进性和纯洁性，努力在全党形成_______生动活泼的政治局面。", "answer": "A;C;D", "options": {"A": "又有集中又有民主", "B": "又有监督又有自由", "C": "又有纪律又有自由", "D": "又有统一意志又有个人心情舒畅", "E": "", "F": ""}}, {"id": 83, "question": "新形势下加强和规范党内政治生活，关键是高级干部特别是_______的组成人员。", "answer": "B;C;D", "options": {"A": "常务委员会", "B": "中央委员会", "C": "中央政治局", "D": "中央政治局常务委员会", "E": "", "F": ""}}, {"id": 84, "question": "理想信念动摇是最危险的动摇，理想信念滑坡是最危险的滑坡.全党同志必须坚定中国特色社会主义的“四个自信”，下列属于“四个自信”的是___。", "answer": "A;B;C;D", "options": {"A": "道路自信", "B": "理论自信", "C": "制度自信", "D": "文化自信", "E": "政治自信", "F": ""}}, {"id": 85, "question": "坚定理想信念，必须加强学习.系统掌握马克思主义基本原理，学会用马克思主义立场、观点、方法观察问题、分析问题、解决问题，特别是要聚焦现实问题，不断深化对_______的认识。", "answer": "B;C;D", "options": {"A": "资本主义社会发展规律", "B": "共产党执政规律", "C": "社会主义建设规律", "D": "人类社会发展规律", "E": "", "F": ""}}, {"id": 86, "question": "坚定理想信念，必须加强学习.适应时代进步和事业发展要求，广泛学习经济、政治、文化、社会、生态文明以及哲学、历史、法律、科技、国防、国际等各方面知识，提高_______能力，提高领导能力专业化水平。", "answer": "A;B;C;D;E", "options": {"A": "战略思维", "B": "创新思维", "C": "辩证思维", "D": "法治思维", "E": "底线思维", "F": ""}}, {"id": 87, "question": "坚持党的基本路线，全党必须坚持的五大发展理念是_______。", "answer": "A;B;C;D;E", "options": {"A": "创新", "B": "协调", "C": "绿色", "D": "开放", "E": "共享", "F": ""}}, {"id": 88, "question": "坚持正确选人用人导向，要求做到_______。", "answer": "A;B;C;D;E", "options": {"A": "不准把党的干部当作私有财产，党内不准搞人身依附关系", "B": "领导干部特别是高级干部不能搞家长制，要求别人唯命是从", "C": "特别是不能要求下级办违反党纪国法的事情", "D": "下级应该抵制上级领导干部的这种要求并向更上级党组织直至党中央报告", "E": "不应该对上级领导干部无原则服从", "F": ""}}, {"id": 89, "question": "严格党的组织生活制度，应该坚持_______。", "answer": "A;B;C;D", "options": {"A": "“三会一课”制度", "B": "民主生活会和组织生活会制度", "C": "谈心谈话制度", "D": "对党员进行民主评议", "E": "", "F": ""}}, {"id": 90, "question": "坚持“三会一课”制度，坚决防止_______。", "answer": "A;B;C;D", "options": {"A": "表面化", "B": "形式化", "C": "娱乐化", "D": "庸俗化", "E": "自由化", "F": ""}}, {"id": 91, "question": "保持党同人民群众的血肉联系，党的各级组织、全体党员特别是领导干部必须____。", "answer": "A;B;C;D", "options": {"A": "坚决反对命令主义", "B": "坚决反对“尾巴主义”", "C": "不允许为了个人政绩、选票和形象脱离实际随意决策、随便许愿", "D": "把党的主张变为群众的自觉行动，引领群众听党话、跟党走", "E": "", "F": ""}}, {"id": 92, "question": "保持党同人民群众的血肉联系，全党必须坚决反对_____。", "answer": "A;B;D;E", "options": {"A": "形式主义", "B": "官僚主义", "C": "自由主义", "D": "享乐主义", "E": "奢靡之风", "F": ""}}, {"id": 93, "question": "在长期实践中，我们党形成了以_____等为主要内容的党内政治生活基本规范，为保证完成党在各个历史时期中心任务发挥了重要作用。", "answer": "A;B;C;D;E;F", "options": {"A": "理论联系实际", "B": "实事求是", "C": "密切联系群众", "D": "批评和自我批评", "E": "民主集中制", "F": "严明党的纪律"}}, {"id": 94, "question": "党员廉洁自律规范的内容包括____。", "answer": "A;B;C;D", "options": {"A": "坚持公私分明，先公后私，克己奉公", "B": "坚持崇廉拒腐，清白做人，干净做事", "C": "坚持尚俭戒奢，艰苦朴素，勤俭节约", "D": "坚持吃苦在前，享受在后，甘于奉献", "E": "", "F": ""}}, {"id": 95, "question": "党员领导干部廉洁自律规范的内容包括____。", "answer": "A;B;C;D", "options": {"A": "廉洁从政，自觉保持人民公仆本色", "B": "廉洁用权，自觉维护人民根本利益", "C": "廉洁修身，自觉提升思想道德境界", "D": "廉洁齐家，自觉带头树立良好家风", "E": "", "F": ""}}, {"id": 96, "question": "党的纪律处分工作应当坚持以下原则有____。", "answer": "A;B;C;D;E", "options": {"A": "党要管党、全面从严治党", "B": "党纪面前一律平等", "C": "实事求是", "D": "民主集中制", "E": "惩前毖后、治病救人", "F": ""}}, {"id": 97, "question": "对党员的纪律处分有____。", "answer": "A;B;C;D", "options": {"A": "警告", "B": "严重警告", "C": "撤销党内职", "D": "留党察看", "E": "开除公职", "F": ""}}, {"id": 98, "question": "对于严重违犯党纪、本身又不能纠正的党组织，上一级党的委员会在查明核实后，根据情节严重的程度，可以予以：", "answer": "A;C", "options": {"A": "改组", "B": "重组", "C": "解散", "D": "合并", "E": "", "F": ""}}, {"id": 99, "question": "党员受留党察看处分期间，没有哪些权利。____", "answer": "A;B;C", "options": {"A": "表决权", "B": "选举权", "C": "被选举权", "D": "发言权", "E": "", "F": ""}}, {"id": 100, "question": "有下列情形之一的，可以从轻或者减轻处分。____", "answer": "A;B;C;D;E", "options": {"A": "主动交代本人应当受到党纪处分的问题", "B": "检举同案人或者其他人应当受到党纪处分或者法律追究的问题，经查证属实，或者有其他立功表现", "C": "主动挽回损失、消除不良影响或者有效阻止危害结果发生", "D": "主动上交或者退赔违纪所得", "E": "党内法规规定的其他从轻或者减轻处分情形", "F": ""}}, {"id": 101, "question": "有下列情形之一的，应当从重或者加重处分。____", "answer": "A;B;C;D;E", "options": {"A": "强迫、唆使他人违纪", "B": "拒不上交或者退赔违纪所得", "C": "违纪受处分后又因故意违纪应当受到党纪处分", "D": "违纪受处分后，又被发现其受处分前没有交代的其他应当受到党纪处分的问题", "E": "党内法规规定的其他从重或者加重处分情形", "F": ""}}, {"id": 102, "question": "党组织在纪律审查中发现党员有贪污贿赂、滥用职权、玩忽职守、权力寻租、利益输送、徇私舞弊、浪费国家资财等违反法律涉嫌犯罪行为的，应当给予哪几种处分。____", "answer": "B;C;D", "options": {"A": "严重警告", "B": "撤销党内职务", "C": "留党察看", "D": "开除党籍", "E": "", "F": ""}}, {"id": 103, "question": "党员犯罪，有下列情形之一的，应当给予开除党籍处分。____", "answer": "A;B;C", "options": {"A": "因故意犯罪被依法判处刑法规定的主刑（含宣告缓刑）", "B": "被单处或者附加剥夺政治权利", "C": "因过失犯罪，被依法判处三年以上（不含三年）有期徒刑", "D": "因过失犯罪被判处三年以下（含三年）有期徒刑或者被判处管制、拘役的", "E": "", "F": ""}}, {"id": 104, "question": "通过网络、广播、电视、报刊、传单、书籍等，或者利用讲座、论坛、报告会、座谈会等方式，有下列行为之一，情节较轻的，给予警告或者严重警告处分；情节较重的，给予撤销党内职务或者留党察看处分；情节严重的，给予开除党籍处分。____", "answer": "A;B;C;D", "options": {"A": "公开发表违背四项基本原则，违背、歪曲党的改革开放决策，或者其他有严重政治问题的文章、演说、宣言、声明等", "B": "妄议党中央大政方针，破坏党的集中统一", "C": "丑化党和国家形象，或者诋毁、诬蔑党和国家领导人、英雄模范", "D": "歪曲党的历史、中华人民共和国历史、人民军队历史", "E": "", "F": ""}}, {"id": 105, "question": "对抗组织审查，有下列行为之一的，给予警告或者严重警告处分；情节较重的，给予撤销党内职务或者留党察看处分；情节严重的，给予开除党籍处分。____", "answer": "A;B;C;D;E", "options": {"A": "串供或者伪造、销毁、转移、隐匿证据", "B": "串供或者伪造、销毁、转移、隐匿证据", "C": "包庇同案人员", "D": "向组织提供虚假情况，掩盖事实", "E": "其他对抗组织审查行为", "F": ""}}, {"id": 106, "question": "有下列行为之一，情节较重的，给予警告或者严重警告处分。____", "answer": "A;B;C;D", "options": {"A": "违反个人有关事项报告规定，隐瞒不报", "B": "在组织进行谈话函询时，不如实向组织说明问题", "C": "不按要求报告或者不如实报告个人去向", "D": "不如实填报个人档案资料", "E": "其他应报告而未报告的事宜", "F": ""}}, {"id": 107, "question": "有下列行为之一的，对直接责任者和领导责任者，给予警告或者严重警告处分；情节较重的，给予撤销党内职务或者留党察看处分；情节严重的，给予开除党籍处分。____", "answer": "A;B;C;D", "options": {"A": "对批评、检举、控告进行阻挠、压制，或者将批评、检举、控告材料私自扣压、销毁，或者故意将其泄露给他人", "B": "对党员的申辩、辩护、作证等进行压制，造成不良后果", "C": "压制党员申诉，造成不良后果，或者不按照有关规定处理党员申诉", "D": "其他侵犯党员权利行为，造成不良后果", "E": "", "F": ""}}, {"id": 108, "question": "党组织有下列行为之一，对直接责任者和领导责任者，情节较重的，给予警告或者严重警告处分；情节严重的，给予撤销党内职务或者留党察看处分。____", "answer": "A;B;C;D", "options": {"A": "党员被立案审查期间，擅自批准其出差、出国（境）、辞职，或者对其交流、提拔职务、晋升职级、进一步使用、奖励，或者办理退休手续", "B": "党员被依法追究刑事责任后，不按照规定给予党纪处分，或者对党员违反国家法律法规的行为，应当给予党纪处分而不处分", "C": "党纪处分决定或者申诉复查决定作出后，不按照规定落实决定中关于被处分人党籍、职务、职级、待遇等事项", "D": "党员受到党纪处分后，不按照干部管理权限和组织关系对受处分党员开展日常教育、管理和监督工作", "E": "对受到党纪处分的党员采取歧视态度的", "F": ""}}, {"id": 109, "question": "违反有关规定干预和插手市场经济活动，有下列行为之一，情节较轻的，给予警告或者严重警告处分；情节较重的，给予撤销党内职务或者留党察看处分；情节严重的，给予开除党籍处分。____", "answer": "A;B;C;D;E", "options": {"A": "干预和插手建设工程项目承发包、土地使用权出让、政府采购、房地产开发与经营、矿产资源开发利用、中介机构服务等活动", "B": "干预和插手国有企业重组改制、兼并、破产、产权交易、清产核资、资产评估、资产转让、重大项目投资以及其他重大经营活动等事项", "C": "干预和插手批办各类行政许可和资金借贷等事项", "D": "干预和插手经济纠纷", "E": "干预和插手集体资金、资产和资源的使用、分配、承包、租赁等事项", "F": ""}}, {"id": 110, "question": "我们党必须坚定地站在时代潮流的前头，团结和带领全国各族人民，实现推进现代化建设、____、____与____这三大历史任务，在中国特色社会主义道路上实现中华民族的伟大复兴。这是历史和时代赋予我们党的庄严使命。", "answer": "A;B;D", "options": {"A": "完成祖国统一", "B": "维护世界和平", "C": "建设中国特色社会主义", "D": "促进共同发展", "E": "发展社会主义市场经济", "F": ""}}, {"id": 111, "question": "党的各级委员会实行集体领导和个人分工负责相结合的制度。凡属重大问题都要按照集体领导、____、____、____的原则，由党的委员会集体讨论，作出决定。", "answer": "A;C;D", "options": {"A": "民主集中", "B": "个别商谈", "C": "个别酝酿", "D": "会议决定", "E": "", "F": ""}}, {"id": 112, "question": "为完成党在新世纪新阶段的全面建设小康社会的奋斗目标，发展要有新思路，____、____，各项工作要有新举措。", "answer": "A;C", "options": {"A": "改革要有新突破", "B": "稳定要有新突破", "C": "开放要有新局面", "D": "建设要有新局面", "E": "", "F": ""}}, {"id": 113, "question": "发展社会主义民主政治，建设社会主义政治文明，是全面建设小康社会的重要目标。发展社会主义民主政治，最根本的是要把坚持____、____和____有机统一起来。", "answer": "A;B;C", "options": {"A": "党的领导", "B": "人民当家作主", "C": "依法治国", "D": "以法治国", "E": "以德治国", "F": ""}}, {"id": 114, "question": "推进党的作风建设，要以____、____为根本目的，发扬党的优良传统和作风，按照中央提出的“八个坚持，八个反对”，一大教育，二靠制度，正确开展批评与自我批评，着力解决党的思想作风、学风、工作作风、领导作风和干部生活作风方面的突出问题，特别是要防止和克服形式主义、官僚主义。", "answer": "A;D", "options": {"A": "立党为公", "B": "为人民服务", "C": "无私品德", "D": "执政为民", "E": "", "F": ""}}, {"id": 115, "question": "全党同志始终保持共产党人的____、____、____，永远同人民群众心连心，我们党的执政基础就坚如磐石。", "answer": "B;C;D", "options": {"A": "革命生气", "B": "蓬勃朝气", "C": "昂扬锐气", "D": "浩然正气", "E": "革命骨气", "F": ""}}, {"id": 116, "question": "党对待犯错误的同志的基本方针是____。", "answer": "B;D;E", "options": {"A": "严肃处理", "B": "惩前毖后，治病救人", "C": "执纪必严，违纪必究", "D": "批评教育和纪律处分", "E": "抓早抓小，防微杜渐", "F": ""}}, {"id": 117, "question": "宗教事务管理坚持______的原则。", "answer": "A;B;C;D;E", "options": {"A": "保护合法", "B": "制止非法", "C": "遏制极端", "D": "抵御渗透", "E": "打击犯罪", "F": ""}}, {"id": 118, "question": "任何组织或者个人，不得利用宗教进行______，以及其他损害国家利益、社会公共利益和公民合法权益等违法活动。", "answer": "A;B;C;D", "options": {"A": "危害国家安全", "B": "破坏社会秩序", "C": "损害公民身体健康", "D": "妨碍国家教育制度", "E": "", "F": ""}}, {"id": 119, "question": "禁止在宗教院校以外的学校及其他教育机构______。", "answer": "A;B;C;D", "options": {"A": "传教", "B": "举行宗教活动", "C": "成立宗教组织", "D": "设立宗教活动场所", "E": "", "F": ""}}, {"id": 120, "question": "违反民主集中制原则，有下列行为之一的，给予警告或者严重警告处；情节严重的，给予撤销党内职务或者留党察看处分。", "answer": "A;B;C;D", "options": {"A": "拒不执行或者擅自改变党组织作出的重大决定的", "B": "违反议事规则,个人或者少数人决定重大问题的", "C": "故意规避集体决策,决定重大事项、重要干部任免、重要项目安排和大额资金使用的", "D": "借集体决策名义集体违规的", "E": "", "F": ""}}, {"id": 121, "question": "在______等事项中优亲厚友、明显有失公平的,给予警告或者严重警告处分;情节较重的,给予撤销党内职务或者留党察看处分;情节严重的,给予开除党籍处分。", "answer": "A;B;C;D", "options": {"A": "社会保障", "B": "政策扶持", "C": "扶贫脱贫", "D": "救灾救济款物分配", "E": "", "F": ""}}, {"id": 122, "question": "坚持党总揽全局、协调各方,建立健全坚持和加强党的全面领导的制度体系,为把党的领导落实到______，______，______各领域各方面各环节提供坚实制度保障。", "answer": "A;B;C", "options": {"A": "改革发展稳定", "B": "内政外交国防", "C": "治党治国治军", "D": "改革开放", "E": "", "F": ""}}, {"id": 123, "question": "习近平总书记在内蒙古考察时，强调各地区各部门在开展主题教育中要注意抓“四个到位”。“四个到位”具体是,______。", "answer": "A;B;D;E", "options": {"A": "抓思想认识到位", "B": "抓检视问题到位", "C": "抓调查研究到位", "D": "抓整改落实到位", "E": "抓组织领导到位", "F": ""}}, {"id": 124, "question": "习近平总书记指出坚持新发展理念，是关系我国发展全局的一场深刻革命，新发展理念指的是______的发展理念？", "answer": "A;B;C;D;E", "options": {"A": "创新", "B": "协调", "C": "绿色", "D": "开放", "E": "共享", "F": ""}}, {"id": 125, "question": "我国现阶段面临的考验包括以下______？", "answer": "A;B;C;D", "options": {"A": "执政考验", "B": "改革开放考验", "C": "市场经济考验", "D": "外部环境考研", "E": "", "F": ""}}, {"id": 126, "question": "四风问题指的是形式主义、______、享乐主义和 ______？", "answer": "B;C", "options": {"A": "盲目主义", "B": "官僚主义", "C": "奢靡主义", "D": "跟风主义", "E": "", "F": ""}}, {"id": 127, "question": "对于我国发展环境面临的深刻复杂变化，说法正确的有", "answer": "A;C;D", "options": {"A": "和平与发展仍是时代主题", "B": "人类命运共同体尚未深入人心", "C": "我国发展不平衡不充分问题仍然突出", "D": "我国已转向高质量发展阶段", "E": "", "F": ""}}, {"id": 128, "question": "走中国特色社会主义乡村振兴道路，全面实施乡村振兴战略，强化以工补农、以城带乡，推动形成____、____、____、____的新型工农城乡关系，加快农业农村现代化。", "answer": "A;B;C;D", "options": {"A": "工农互促", "B": "城乡互补", "C": "协调发展", "D": "共同繁荣", "E": "以农补工", "F": ""}}, {"id": 129, "question": "二十大报告指出，中国共产党和中国人民为解决人类面临的共同问题提供更多更好的____、____、____，为人类和平与发展崇高事业作出新的更大的贡献！", "answer": "A;B;C", "options": {"A": "中国智慧", "B": "中国方案", "C": "中国力量", "D": "中国经验", "E": "", "F": ""}}, {"id": 130, "question": "二十大报告指出，要建设堪当民族复兴重任的高素质干部队伍。树立选人用人正确导向，选拔___________的高素质专业化干部，选优配强各级领导班子。", "answer": "A;C;D", "options": {"A": "干净", "B": "优秀", "C": "担当", "D": "忠诚", "E": "", "F": ""}}, {"id": 131, "question": "二十大报告指出，我们要推进美丽中国建设，坚持山水林田湖草沙一体化保护和系统治理，统筹___________，协同推进降碳、减污、扩绿、增长，推进生态优先、节约集约、绿色低碳发展。", "answer": "A;B;C;D", "options": {"A": "产业结构调整", "B": "污染治理", "C": "生态保护", "D": "应对气候变化", "E": "", "F": ""}}, {"id": 132, "question": "二十大报告指出，教育、科技、人才是全面建设社会主义现代化国家的__________支撑。", "answer": "C;D", "options": {"A": "持续性", "B": "全局性", "C": "战略性", "D": "基础性", "E": "", "F": ""}}, {"id": 133, "question": "二十大报告指出，我们以巨大的政治勇气全面深化改革，打响改革攻坚战，加强改革顶层设计，坚决破除各方面体制机制弊端，各领域基础性制度框架基本建立，许多领域实现", "answer": "A;B;D", "options": {"A": "系统性重塑", "B": "整体性重构", "C": "根本性改变", "D": "历史性变革", "E": "", "F": ""}}, {"id": 134, "question": "党的二十大通过的新修改的《中国共产党章程》指出，经过长期实践，积累了坚持党的领导、__________、坚持敢于斗争、坚持统一战线、坚持自我革命的宝贵历史经验，这是党和人民共同创造的精神财富，必须倍加珍惜、长期坚持，并在实践中不断丰富和发展。", "answer": "A;B;C;D;E;F", "options": {"A": "坚持人民至上", "B": "坚持理论创新", "C": "坚持独立自主", "D": "坚持中国道路", "E": "坚持胸怀天下", "F": "坚持开拓创新"}}, {"id": 135, "question": "党的二十大通过的新修改的《中国共产党章程》指出，充分发挥科学技术作为第一生产力的作用，充分发挥人才作为第一资源的作用，充分发挥创新作为引领发展第一动力的作用，依靠科技进步，提高劳动者素质，促进国民经济__________发展。", "answer": "A;B;C;D;E", "options": {"A": "更高质量", "B": "更有效率", "C": "更加公平", "D": "更可持续", "E": "更为安全", "F": ""}}, {"id": 136, "question": "党的二十大报告指出，加强党的政治建设，严明政治纪律和政治规矩，落实各级党委（党组）主体责任，提高各级党组织和党员干部________。", "answer": "A;B;D", "options": {"A": "政治判断力", "B": "政治领悟力", "C": "政治宣传力", "D": "政治执行力", "E": "", "F": ""}}, {"id": 137, "question": "党的二十大报告指出，从现在起，中国共产党的中心任务就是________。", "answer": "A;B;C", "options": {"A": "结带领全国各族人民全面建成社会主义现代化强国", "B": "实现第二个百年奋斗目标", "C": "以中国式现代化全面推进中华民族伟大复兴", "D": "实现中国式现代化", "E": "", "F": ""}}, {"id": 138, "question": "党的二十大报告指出，中国式现代化的本质要求是：______，坚持中国特色社会主义，        ，______，丰富人民精神世界，实现全体人民共同富裕，促进人与自然和谐共生，推动构建人类命运共同体，创造人类文明新形态。", "answer": "A;B;D", "options": {"A": "坚持中国共产党领导", "B": "实现高质量发展", "C": "坚持理论创新", "D": "发展全过程人民民主", "E": "", "F": ""}}, {"id": 139, "question": "党的二十大报告指出，我们要以科学的态度对待科学、以真理的精神追求真理，坚持______、坚持______、坚持______，紧跟时代步伐，顺应实践发展，以满腔热忱对待一切新生事物，不断拓展认识的广度和深度，敢于说前人没有说过的新话，敢于干前人没有干过的事情，以新的理论指导新的实践。", "answer": "A;B;C", "options": {"A": "马克思主义基本原理不动摇", "B": "党的全面领导不动摇", "C": "中国特色社会主义不动摇", "D": "改革开放不动摇", "E": "", "F": ""}}, {"id": 140, "question": "《党章》规定，中国共产党在社会主义初级阶段的基本路线是______。", "answer": "A;B;C;D", "options": {"A": "领导和团结全国各族人民，以经济建设为中心", "B": "坚持四项基本原则，坚持改革开放", "C": "自力更生，艰苦创业", "D": "为把我国建设成为富强民主文明和谐美丽的社会主义现代化强国而奋斗", "E": "", "F": ""}}, {"id": 141, "question": "党的二十大的主题是：______，______，______，自信自强、守正创新，踔厉奋发、勇毅前行，为全面建设社会主义现代化国家、全面推进中华民族伟大复兴而团结奋斗。", "answer": "A;B;C", "options": {"A": "高举中国特色社会主义伟大旗帜", "B": "全面贯彻新时代中国特色社会主义思想", "C": "弘扬伟大建党精神", "D": "不忘初心、牢记使命", "E": "", "F": ""}}, {"id": 142, "question": "从十八大召开至今，十年来我们经历了对党和人民事业具有重大现实意义和深远历史意义的三件大事：一是______，二是______，三是______，实现第一个百年奋斗目标。", "answer": "B;C;D", "options": {"A": "全面深化改革取得重大突破", "B": "迎来中国共产党成立一百周年", "C": "中国特色社会主义进入新时代", "D": "完成脱贫攻坚、全面建成小康社会的历史任务", "E": "", "F": ""}}, {"id": 143, "question": "党的二十大报告指出，要以党的政治建设统领党的建设各项工作，坚持______和______同向发力。", "answer": "A;C", "options": {"A": "思想建党", "B": "理论强党", "C": "制度治党", "D": "依规治党", "E": "", "F": ""}}, {"id": 144, "question": "经过长期实践，我们积累了坚持党的领导、______、______、______、坚持中国道路、坚持胸怀天下、坚持开拓创新、坚持敢于斗争、坚持统一战线、坚持自我革命的宝贵历史经验。", "answer": "A;B;D", "options": {"A": "坚持人民至上", "B": "坚持理论创新", "C": "坚持自力更生", "D": "坚持独立自主", "E": "", "F": ""}}, {"id": 145, "question": "党的十八大以来，以习近平同志为核心的党中央坚持把马克思主义基本原理同______、同______相结合，科学回答了新时代坚持和发展什么样的中国特色社会主义、怎样坚持和发展中国特色社会主义等重大时代课题。", "answer": "A;D", "options": {"A": "中国具体实际", "B": "中国传统文化", "C": "各国具体实践", "D": "中华优秀传统文化", "E": "", "F": ""}}, {"id": 146, "question": "习近平总书记在文化传承发展座谈会上指出，中华文明具有突出的______。", "answer": "A;B;C;D;E", "options": {"A": "连续性", "B": "创新性", "C": "统一性", "D": "包容性", "E": "和平性", "F": ""}}, {"id": 147, "question": "要构建铸牢中华民族共同体意识宣传教育常态化机制，纳入______ 体系，搞好社会宣传教育。", "answer": "B;C;D", "options": {"A": "青年教育", "B": "干部教育", "C": "党员教育", "D": "国民教育", "E": "", "F": ""}}, {"id": 148, "question": "贵州省委十三届三次全会提出，要全面加强党的领导和党的建设，以高质量党建保障中国式现代化的贵州实践。要______、要______、要打造坚强有力的战斗堡垒、要树立重实干重实绩的用人导向、要______。", "answer": "A;C;D", "options": {"A": "铸牢绝对忠诚的政治品格", "B": "聚焦高质量发展的首要任务", "C": "深入开展主题教育", "D": "巩固风清气正的政治生态", "E": "", "F": ""}}, {"id": 149, "question": "我们坚持把实现人民对美好生活的向往作为现代化建设的出发点和落脚点，着力维护和促进社会 ________，着力促进全体人民 ________，坚决防止两极分化。", "answer": "B;C", "options": {"A": "稳定和谐", "B": "公平正义", "C": "共同富裕", "D": "同步富裕", "E": "", "F": ""}}, {"id": 150, "question": "我们要加快建设________、________、________，坚持为党育人，为国育才，全面提升人才自主培养质量。", "answer": "A;B;D", "options": {"A": "教育强国", "B": "科技强国", "C": "文化强国", "D": "人才强国", "E": "", "F": ""}}, {"id": 151, "question": "全党要把青年工作作为战略性工作来抓，用党的科学理论武装青年，用党的初心使命感召青年，作青年朋友的________、青年工作的________、青年群众的________。", "answer": "A;B;D", "options": {"A": "知心人", "B": "热心人", "C": "培养人", "D": "引路人", "E": "", "F": ""}}, {"id": 152, "question": "________、________是社会主义现代化的根本要求。", "answer": "A;D", "options": {"A": "物质富足", "B": "物质丰富", "C": "精神丰富", "D": "精神富有", "E": "", "F": ""}}, {"id": 153, "question": "党的二十大报告指出，中国共产党为什么能，中国特色社会主义为什么好，________，________。", "answer": "A;B", "options": {"A": "归根到底是马克思主义行", "B": "是中国化时代化的马克思主义行", "C": "归根到底是马克思主义能", "D": "是中国化时代化的马克思主义好", "E": "", "F": ""}}, {"id": 154, "question": "党的二十大报告指出，我们要健全人民当家作主制度体系，扩大人民有序政治参与，保证人民依法实行 ________、民主管理、民主监督，发挥人民群众积极性、主动性、创造性，巩固和发展生动活泼、安定团结的政治局面。", "answer": "B;C;D", "options": {"A": "民主参政", "B": "民主选举", "C": "民主协商", "D": "民主决策", "E": "", "F": ""}}, {"id": 155, "question": "党的二十大报告指出，大自然是人类赖以生存发展的基本条件。________，是全面建设社会主义现代化国家的内在要求。必须牢固树立和践行绿水青山就是金山银山的理念，站在人与自然和谐共生的高度谋划发展。", "answer": "A;B;C", "options": {"A": "尊重自然", "B": "顺应自然", "C": "保护自然", "D": "利用自然", "E": "", "F": ""}}, {"id": 156, "question": "党的二十大报告指出，我们要落实新时代党的建设总要求，健全全面从严治党体系，全面推进党的 ________，使我们党坚守初心使命，始终成为中国特色社会主义事业的坚强领导核心。", "answer": "A;B;C;D", "options": {"A": "自我净化", "B": "自我完善", "C": "自我革新", "D": "自我提高", "E": "", "F": ""}}, {"id": 157, "question": "《党章》规定，按照德才兼备、以德为先的原则选拔干部，努力实现干部队伍的________。", "answer": "A;B;C;D", "options": {"A": "革命化", "B": "年轻化", "C": "知识化", "D": "专业化", "E": "", "F": ""}}, {"id": 158, "question": "党组织对违犯党的纪律的党员，坚持________，按照错误性质和情节轻重，给以批评教育直至纪律处分。", "answer": "A;C;D", "options": {"A": "惩前毖后、治病救人", "B": "坦白从宽、抗拒从严", "C": "执纪必严、违纪必究", "D": "抓早抓小、防微杜渐", "E": "", "F": ""}}, {"id": 159, "question": "下列选项中，我们要坚决反对的有________。", "answer": "A;B;C;D", "options": {"A": "拜金主义", "B": "享乐主义", "C": "极端个人主义", "D": "历史虚无主义", "E": "", "F": ""}}, {"id": 160, "question": "完善基本公共服务制度体系，加强________民生建设", "answer": "A;B;D", "options": {"A": "普惠性", "B": "基础性", "C": "保障性", "D": "兜底性", "E": "", "F": ""}}, {"id": 161, "question": "构建协调配套的制度体系________提高居民收入在国民收入分配中的比重，提高劳动报酬在初次分配中的比重。", "answer": "A;B;D", "options": {"A": "初次分配", "B": "再分配", "C": "第二次分配", "D": "第三次分配", "E": "", "F": ""}}, {"id": 162, "question": "完善________等重点群体就业支持体系，健全终身职业技能培训制度。", "answer": "A;C;D", "options": {"A": "高校毕业生", "B": "灵活就业人员", "C": "农民工", "D": "退役军人", "E": "", "F": ""}}, {"id": 163, "question": "下列选项中，属于中国式现代化的重要保障的有________。", "answer": "A;D", "options": {"A": "法治", "B": "人口高质量发展", "C": "宪法", "D": "高水平社会主义市场经济体制", "E": "", "F": ""}}, {"id": 164, "question": "落实八项规定，在精简文件简报时，应关注哪些要点？（ ）", "answer": "B;C", "options": {"A": "文件语言需华丽，展现单位文化", "B": "确保文件内容有针对性，解决实际问题", "C": "严格控制文件发放范围，避免不必要传播", "D": "增加文件简报数量，全面记录工作", "E": "", "F": ""}}, {"id": 165, "question": "改进新闻报道时，以下哪些做法符合八项规定精神？", "answer": "B;C;D", "options": {"A": "突出报道领导个人的工作细节", "B": "根据新闻价值决定是否报道领导活动", "C": "压缩领导一般性活动报道的时长", "D": "多报道基层群众的先进事迹", "E": "", "F": ""}}, {"id": 166, "question": "落实八项规定，在公务接待中应避免________。", "answer": "B;C", "options": {"A": "按照接待标准提供餐饮服务", "B": "陪餐人数过多", "C": "提供高档烟酒", "D": "使用本地特色食材", "E": "", "F": ""}}, {"id": 167, "question": "党的二十届四中全会提出，要坚持马克思主义在意识形态领域的指导地位，植根博大精深的中华文明，顺应信息技术发展潮流，发展具有强大________的新时代中国特色社会主义文化，扎实推进文化强国建设。", "answer": "A;B;C;D", "options": {"A": "思想引领力", "B": "精神凝聚力", "C": "价值感召力", "D": "国际影响力", "E": "", "F": ""}}, {"id": 168, "question": "为实现“十五五”规划，党的二十届四中全会提出必须增强党的________。", "answer": "A;B;C;D", "options": {"A": "政治领导力", "B": "思想引领力", "C": "群众组织力", "D": "社会号召力", "E": "", "F": ""}}, {"id": 169, "question": "推进社会主义民主法治建设。坚定不移走中国特色社会主义政治发展道路，坚持________有机统一，发展全过程人民民主，完善中国特色社会主义法治体系", "answer": "A;C;D", "options": {"A": "党的领导", "B": "民主协商", "C": "人民当家作主", "D": "依法治国", "E": "", "F": ""}}], "judge": [{"id": 1, "question": "被习近平总书记称为共产党人精神上的“钙”的是群众观念。", "answer": "错误"}, {"id": 2, "question": "我们党的最大政治优势是加强作风建设。", "answer": "错误"}, {"id": 3, "question": "党内法规是建设社会主义法治国家的有力保障。", "answer": "正确"}, {"id": 4, "question": "党员干部是全面推进依法治国的重要组织者、推动者、实践者。", "answer": "正确"}, {"id": 5, "question": "凡是党员都可以作入党介绍人。", "answer": "错误"}, {"id": 6, "question": "党章要求各级领导干部要加强道德修养，讲党性、重品行、做表率，做到自重、自省、自警、自励。", "answer": "正确"}, {"id": 7, "question": "党选拔干部坚持五湖四海、任人唯贤，反对任人唯亲。", "answer": "正确"}, {"id": 8, "question": "不断提高党的领导水平和执政水平、提高拒腐防变和抵御风险能力，是党巩固执政地位、实现执政使命必须解决好的重大课题。", "answer": "正确"}, {"id": 9, "question": "党章规定：党在任何时候都把党的利益放在第一位 ，同群众同甘共苦，保持最密切的联系，不允许任何党员脱离群众，凌驾于群众之上。", "answer": "错误"}, {"id": 10, "question": "预备党员转为正式党员，或延长预备期，或取消预备党员资格，都应当经支部大会讨论通过和上级党组织批准 。", "answer": "正确"}, {"id": 11, "question": "党员缺乏革命意志，不履行党员义务，不符合党员条件，党的支部应当对他进行教育，要求他限期改正；经教育仍无转变的，应当劝他退党。", "answer": "正确"}, {"id": 12, "question": "党员如果没有正当理由，连续三个月不参加党的组织生活，或不交纳党费，或不做党所分配的工作，就被认为是自行脱党。支部大会应当决定把这样的党员除名，并报上级党组织批准。", "answer": "错误"}, {"id": 13, "question": "中国共产主义青年团是中国共产党领导的先进青年的群众组织，是广大青年在实践中学习中国特色社会主义和共产主义的学校，是党的助手和同盟军。", "answer": "错误"}, {"id": 14, "question": "社会主义核心价值体系是兴国之魂，决定着中国特色社会主义发展方向。", "answer": "正确"}, {"id": 15, "question": "要推进科学立法、严格执法、公正司法、全民守法，坚持法律面前人人平等，保证有法必依、执法必严、违法必究。", "answer": "正确"}, {"id": 16, "question": "中国特色社会主义道路是实现途径，中国特色社会主义理论体系是行动指南，中国特色社会主义制度是根本保障，三者统一于中国特色社会主义伟大实践。", "answer": "正确"}, {"id": 17, "question": "党的各级领导干部，无论是由民主选举产生的，或是由领导机关任命的，他们的职务都不是终身的，都可以变动或解除。", "answer": "正确"}, {"id": 18, "question": "对党的决议和政策如有不同意见，在坚决执行的前提下，可以声明保留，并且可以把自己的意见向党的上级组织直至中央提出。", "answer": "正确"}, {"id": 19, "question": "党章是党的根本大法。", "answer": "正确"}, {"id": 20, "question": "理论联系实际是马克思主义的学风。", "answer": "正确"}, {"id": 21, "question": "党的宗旨是全心全意为人民服务。", "answer": "正确"}, {"id": 22, "question": "申请入党不需要任何条件。", "answer": "错误"}, {"id": 23, "question": "马克思列宁主义、毛泽东思想、邓小平理论、“三个代表”重要思想和科学发展观各自独立，没有任何关联。", "answer": "错误"}, {"id": 24, "question": "在社会主义初级阶段，党员标准应适当降低。", "answer": "错误"}, {"id": 25, "question": "党除了工人阶级和最广大人民群众的利益，没有自己特殊的利益。", "answer": "正确"}, {"id": 26, "question": "留党察看是党内的最高处分。", "answer": "错误"}, {"id": 27, "question": "党的下级组织必须坚决执行上级组织的决定。", "answer": "正确"}, {"id": 28, "question": "党员有退党的自由。", "answer": "正确"}, {"id": 29, "question": "职务高的党员，可以不编入党的一个支部、小组或特定组织。", "answer": "错误"}, {"id": 30, "question": "预备党员可以不履行党员义务。", "answer": "错误"}, {"id": 31, "question": "预备党员的权利同正式党员一样。", "answer": "错误"}, {"id": 32, "question": "发展党员必须坚持入党自愿原则。", "answer": "正确"}, {"id": 33, "question": "马克思主义是过时的理论。", "answer": "错误"}, {"id": 34, "question": "预备党员预备期满，自动成为正式党员。", "answer": "错误"}, {"id": 35, "question": "在组织上入了党，思想上也就入了党。", "answer": "错误"}, {"id": 36, "question": "党的根本宗旨是实现共产主义。", "answer": "错误"}, {"id": 37, "question": "在现阶段，我国社会的主要矛盾是人民日益增长的物质文化需要同落后的社会生产之间的矛盾。", "answer": "错误"}, {"id": 38, "question": "在社会变革中出现的民营科技企业的创业人员和技术人员、受聘于外资企业的管理技术人员、个体户、私营企业主、中介组织的从业人员、自由职业人员等社会阶层，都是中国特色社会主义事业的建设者。", "answer": "正确"}, {"id": 39, "question": "坚持四项基本原则的核心是坚持社会主义道路。", "answer": "错误"}, {"id": 40, "question": "我国的政体是人民民主专政。", "answer": "错误"}, {"id": 41, "question": "我国的国体是人民代表大会制。", "answer": "错误"}, {"id": 42, "question": "实践基础上的理论创新是社会发展和变革的先导。", "answer": "正确"}, {"id": 43, "question": "中国共产党是中国特色社会主义事业的领导核心。", "answer": "正确"}, {"id": 44, "question": "社会主义本质的内容是解放生产力、发展生产力、消灭剥削、消除两极分化、最终达到共产主义。", "answer": "错误"}, {"id": 45, "question": "“两个务必”是指务必保持谦虚、谨慎、不骄、不躁的作风，务必保持理论联系实际的作风。", "answer": "错误"}, {"id": 46, "question": "社会和谐是中国特色社会主义的本质属性。", "answer": "正确"}, {"id": 47, "question": "党的基本路线是党和国家的生命线，是实现科学发展的政治保证。", "answer": "正确"}, {"id": 48, "question": "在当代中国，坚持中国特色社会主义理论体系，就是真正坚持马克思主义。", "answer": "正确"}, {"id": 49, "question": "改革开放以来我们取得一切成绩和进步的根本原因，归结起来就是：开辟了中国特色社会主义道路，形成了中国特色社会主义理论体系。", "answer": "正确"}, {"id": 50, "question": "只有社会主义才能救中国，只有改革开放才能发展中国、发展社会主义、发展马克思主义。", "answer": "正确"}, {"id": 51, "question": "科学发展、社会和谐是发展中国特色社会主义的基本要求。", "answer": "正确"}, {"id": 52, "question": "党的奋斗目标是全心全意为人民服务。", "answer": "错误"}, {"id": 53, "question": "中国共产党的“两个先锋队”性质是指中国共产党是中国工人阶级的先锋队，同时是中国人民的先锋队。", "answer": "错误"}, {"id": 54, "question": "中国共产党的指导思想是马列主义、毛泽东思想、邓小平理论和“三个代表”重要思想。", "answer": "错误"}, {"id": 55, "question": "党的工作重心是经济建设，因此，善于经营的“能人”或“富人”就可以入党。", "answer": "错误"}, {"id": 56, "question": "办好中国的事情，关键在党，关键在党要管党、从严治党。", "answer": "正确"}, {"id": 57, "question": "坚持党在社会主义初级阶段的基本路线不动摇，关键在于坚持“改革开放”不动摇。", "answer": "错误"}, {"id": 58, "question": "社会主义初级阶段是任何国家进入社会主义都要经历的起始阶段。", "answer": "错误"}, {"id": 59, "question": "我国正处于并将长期处于社会主义初级阶段。", "answer": "正确"}, {"id": 60, "question": "社会主义在发展过程中遭受过严重挫折，意味着共产主义“渺茫”。", "answer": "错误"}, {"id": 61, "question": "社会主义制度的发展和完善是一个长期的历史过程。", "answer": "正确"}, {"id": 62, "question": "实现共产主义是一个非常漫长的历史过程。", "answer": "正确"}, {"id": 63, "question": "1980年，党的十一届五中全会制定的《关于党内政治生活的若干准则》，其主要原则和规定今天已经不再适用。", "answer": "错误"}, {"id": 64, "question": "《关于新形势下党内政治生活的若干准则》明确规定，必须把改革作为开展党内政治生活的首要任务。", "answer": "错误"}, {"id": 65, "question": "《关于新形势下党内政治生活的若干准则》明确规定，党要管党、从严治党是党和国家的生命线、人民的幸福线，也是党内政治生活正常开展的根本保证。", "answer": "错误"}, {"id": 66, "question": "涉及全党全国性的重大方针政
