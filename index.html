// ==================== 工具函数 ====================
function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
}

// ==================== 存储 ====================
var SK_WRONG = 'qz_wrong', SK_PROG = 'qz_prog', SK_EXAM = 'qz_exam';

function getWrong() {
    try { return JSON.parse(localStorage.getItem(SK_WRONG) || '[]'); }
    catch(e) { return []; }
}
function saveWrong(list) { localStorage.setItem(SK_WRONG, JSON.stringify(list)); updateWrongDot(); }

function getProgress() {
    try { return JSON.parse(localStorage.getItem(SK_PROG) || '{"single":0,"multi":0,"judge":0}'); }
    catch(e) { return {single:0,multi:0,judge:0}; }
}
function saveProgress(p) { localStorage.setItem(SK_PROG, JSON.stringify(p)); }

function getExamHistory() {
    try { return JSON.parse(localStorage.getItem(SK_EXAM) || '[]'); }
    catch(e) { return []; }
}
function saveExamHistory(h) { localStorage.setItem(SK_EXAM, JSON.stringify(h.slice(-10))); }

function addWrong(q, type) {
    var list = getWrong();
    var found = false;
    for (var i = 0; i < list.length; i++) { if (list[i].type === type && list[i].id === q.id) { found = true; break; } }
    if (!found) { list.push({type: type, id: q.id}); saveWrong(list); }
}
function removeWrong(q, type) {
    var list = getWrong().filter(function(w) { return !(w.type === type && w.id === q.id); });
    saveWrong(list);
}
function isWrong(q, type) {
    return getWrong().some(function(w) { return w.type === type && w.id === q.id; });
}

function updateWrongDot() {
    var n = getWrong().length;
    document.getElementById('wrongDot').style.display = n > 0 ? 'block' : 'none';
}

// ==================== 状态 ====================
var state = {
    page: 'home',
    mode: null,
    questions: [],
    idx: 0,
    answered: false,
    selected: [],
    isMulti: false,
    examSet: {single:20, multi:10, judge:10, time:30},
    examTimer: null,
    examLeft: 0,
    examAnswers: []
};

// ==================== 导航 ====================
function navigateTo(page) {
    state.page = page;
    state.answered = false;
    state.selected = [];
    if (state.examTimer) { clearInterval(state.examTimer); state.examTimer = null; }

    document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
    var ni = document.querySelector('.nav-item[data-page="' + page + '"]');
    if (ni) ni.classList.add('active');

    var backBtn = document.getElementById('backBtn');
    var actionBtn = document.getElementById('headerAction');
    var title = document.getElementById('headerTitle');
    backBtn.style.display = 'none';
    actionBtn.style.display = 'none';
    var titles = {home:'入党积极分子题库', practice:'练习', exam:'模拟考试', wrong:'错题集'};
    title.textContent = titles[page] || '入党积极分子题库';

    render();
    window.scrollTo(0,0);
}

function goBack() {
    if (state.page === 'quiz') navigateTo(state.mode === 'wrong-practice' ? 'wrong' : 'home');
    else if (state.page === 'exam-quiz') {
        if (confirm('确定退出考试吗？答题记录将不会保存。')) navigateTo('exam');
    }
    else if (state.page === 'exam-result') navigateTo('exam');
    else if (state.page === 'wrong-quiz') navigateTo('wrong');
    else navigateTo('home');
}

// ==================== 渲染入口 ====================
function render() {
    var m = document.getElementById('mainContent');
    var backBtn = document.getElementById('backBtn');
    var title = document.getElementById('headerTitle');
    backBtn.style.display = 'none';
    title.textContent = '入党积极分子题库';

    switch(state.page) {
        case 'home': renderHome(m); break;
        case 'practice': renderPracticeMenu(m); break;
        case 'quiz': renderQuiz(m); break;
        case 'exam': renderExamSettings(m); break;
        case 'exam-quiz': renderExamQuiz(m); break;
        case 'exam-result': renderExamResult(m); break;
        case 'wrong': renderWrongList(m); break;
    }
}

                '<span class="icon">&#x274C;</span>' +
                '<span class="label">错题集</span>' +
                '<span class="desc">' + (wc > 0 ? '<span class="badge">' + wc + '题</span>' : '暂无错题') + '</span></div>' +
        '</div>' +
        '<div class="stats-row">' +
            '<div class="stat-card"><div class="num">' + all + '</div><div class="label">题库总数</div></div>' +
            '<div class="stat-card"><div class="num">' + done + '</div><div class="label">顺序已做</div></div>' +
            '<div class="stat-card"><div class="num">' + wc + '</div><div class="label">错题数量</div></div>' +
        '</div>';
}

function renderPracticeMenu(m) {
    m.innerHTML = '<div class="home-cards" style="margin-top:10px">' +
        '<div class="home-card" onclick="startPractice(\'order\')"><span class="icon">&#x1F4D6;</span><span class="label">顺序练习</span><span class="desc">按题库顺序逐题练习</span></div>' +
        '<div class="home-card" onclick="startPractice(\'random\')"><span class="icon">&#x1F3B2;</span><span class="label">随机练习</span><span class="desc">随机抽取题目练习</span></div>' +
        '</div><p style="text-align:center;color:#999;margin-top:30px;font-size:13px">选择题型后开始练习，答完会显示对错</p>';
}

// ==================== 开始练习 ====================
function startPractice(mode) {
    state.mode = mode;
    var qs = [];
    if (mode === 'order') {
        QUESTION_DATA.single.forEach(function(q) { qs.push({question:q.question, answer:q.answer, options:q.options, id:q.id, type:'single'}); });
        QUESTION_DATA.multi.forEach(function(q) { qs.push({question:q.question, answer:q.answer, options:q.options, id:q.id, type:'multi'}); });
        QUESTION_DATA.judge.forEach(function(q) { qs.push({question:q.question, answer:q.answer, id:q.id, type:'judge'}); });
        var pg = getProgress();
        var start = 0;
        if (pg.single < QUESTION_DATA.single.length) { start = pg.single; }
        else if (pg.multi < QUESTION_DATA.multi.length) { start = QUESTION_DATA.single.length + pg.multi; }
        else { start = QUESTION_DATA.single.length + QUESTION_DATA.multi.length + pg.judge; }
        state.idx = Math.max(0, Math.min(start, qs.length - 1));
    } else {
        QUESTION_DATA.single.forEach(function(q) { qs.push({question:q.question, answer:q.answer, options:q.options, id:q.id, type:'single'}); });
        QUESTION_DATA.multi.forEach(function(q) { qs.push({question:q.question, answer:q.answer, options:q.options, id:q.id, type:'multi'}); });
        QUESTION_DATA.judge.forEach(function(q) { qs.push({question:q.question, answer:q.answer, id:q.id, type:'judge'}); });
        shuffle(qs);
        state.idx = 0;
    }
    state.questions = qs;
    state.answered = false;
    state.selected = [];
    state.page = 'quiz';
    updateHeaderForQuiz();
    render();
    window.scrollTo(0,0);
}

function updateHeaderForQuiz() {
    var backBtn = document.getElementById('backBtn');
    var title = document.getElementById('headerTitle');
    backBtn.style.display = 'flex';
    var t = state.mode === 'order' ? '顺序练习' : state.mode === 'random' ? '随机练习' : state.mode === 'exam' ? '模拟考试' : '错题练习';
    title.textContent = t;
}

// ==================== 答题页 ====================
function renderQuiz(m) {
    if (state.questions.length === 0) { m.innerHTML = '<p style="text-align:center;padding:60px;color:#999">没有题目</p>'; return; }

    var q = state.questions[state.idx];
    var total = state.questions.length;
    var idx = state.idx + 1;
    state.isMulti = q.type === 'multi';
    var isJudge = q.type === 'judge';

    var badge = q.type === 'single' ? '<span class="question-type-badge badge-single">单选题</span>' :
                q.type === 'multi' ? '<span class="question-type-badge badge-multi">多选题</span>' :
                '<span class="question-type-badge badge-judge">判断题</span>';

    var optsHtml = '';
    if (isJudge) {
        var sv = state.selected[0];
        optsHtml = '<div class="options-list">' +
            '<button class="option-btn' + (sv === '正确' ? ' selected' : '') + (state.answered ? ' disabled' : '') + '" data-value="正确" onclick="selectJudge(this,\'正确\')"><span class="letter">&#x2713;</span>正确</button>' +
            '<button class="option-btn' + (sv === '错误' ? ' selected' : '') + (state.answered ? ' disabled' : '') + '" data-value="错误" onclick="selectJudge(this,\'错误\')"><span class="letter">&#x2717;</span>错误</button>' +
            '</div>';
        if (state.answered) highlightJudge();
    } else {
        var keys = Object.keys(q.options).filter(function(k) { return q.options[k] && q.options[k].trim(); });
        optsHtml = '<div class="options-list">';
        keys.forEach(function(k) {
            var cls = '';
            if (state.answered) {
                var cAns = (q.answer || '').split(';').map(function(a) { return a.trim(); });
                if (cAns.indexOf(k) >= 0) cls = ' correct';
                if (state.selected.indexOf(k) >= 0 && cAns.indexOf(k) < 0) cls = ' wrong';
                cls += ' disabled';
            } else if (state.isMulti && state.selected.indexOf(k) >= 0) {
                cls = ' selected';
            }
            optsHtml += '<button class="option-btn' + cls + '" data-value="' + k + '" onclick="' + (state.isMulti ? 'toggleMulti(this)' : 'selectSingle(this)') + '"><span class="letter">' + k + '</span>' + q.options[k] + '</button>';
        });
        optsHtml += '</div>';
        if (state.isMulti && !state.answered) {
            optsHtml += '<p class="multi-hint">点击选项选择，可多选，选好后点击"提交答案"</p>';
            optsHtml += '<button class="submit-btn" id="multiSb" onclick="submitMulti()"' + (state.selected.length === 0 ? ' disabled' : '') + '>提交答案</button>';
        }
    }

    var pct = Math.round((state.idx / total) * 100);
    m.innerHTML = '<div class="progress-wrap"><div class="progress-info"><span>' + idx + ' / ' + total + '</span><span>' + pct + '%</span></div><div class="progress-bar"><div class="fill" style="width:' + pct + '%"></div></div></div>' +
        badge +
        '<div class="question-text"><div class="q-id">#' + q.id + '</div>' + q.question + '</div>' +
        optsHtml +
        '<div id="feedbackArea"></div>' +
        '<div class="nav-btns"><button class="nav-btn" onclick="prevQ()"' + (state.idx === 0 ? ' disabled' : '') + '>上一题</button><button class="nav-btn primary" onclick="nextQ()">下一题</button></div>';

    if (state.answered) renderFeedback();
}

function selectSingle(btn) {
    if (state.answered) return;
    state.selected = [btn.dataset.value];
    state.answered = true;
    var q = state.questions[state.idx];
    var cAns = (q.answer || '').split(';').map(function(a) { return a.trim(); });
    var correct = cAns.indexOf(btn.dataset.value) >= 0;
    if (correct) removeWrong(q, q.type);
    else addWrong(q, q.type);
    showFeedback(correct, q, cAns);
    refreshQuizView();
    saveOrderProgress();
}

function toggleMulti(btn) {
    if (state.answered) return;
    var v = btn.dataset.value;
    var idx = state.selected.indexOf(v);
    if (idx >= 0) { state.selected.splice(idx, 1); btn.classList.remove('selected'); }
    else { state.selected.push(v); btn.classList.add('selected'); }
    var sb = document.getElementById('multiSb');
    if (sb) sb.disabled = state.selected.length === 0;
}

function submitMulti() {
    if (state.answered || state.selected.length === 0) return;
    state.answered = true;
    var q = state.questions[state.idx];
    var cAns = (q.answer || '').split(';').map(function(a) { return a.trim(); });
    var sel = state.selected.slice().sort().join('');
    var cor = cAns.slice().sort().join('');
    var correct = sel === cor;
    if (correct) removeWrong(q, q.type);
    else addWrong(q, q.type);
    showFeedback(correct, q, cAns);
    refreshQuizView();
    saveOrderProgress();
}

function selectJudge(btn, value) {
    if (state.answered) return;
    state.selected = [value];
    state.answered = true;
    var q = state.questions[state.idx];
    var correct = (value === (q.answer || '').trim());
    if (correct) removeWrong(q, q.type);
    else addWrong(q, q.type);
    showFeedback(correct, q, (q.answer || '').trim());
    refreshQuizView();
    saveOrderProgress();
}

function showFeedback(correct, q, correctAns) {
    var area = document.getElementById('feedbackArea');
    if (!area) return;
    var cs = Array.isArray(correctAns) ? correctAns.join('、') : correctAns;
    area.innerHTML = '<div class="result-overlay ' + (correct ? 'correct' : 'wrong') + '">' + (correct ? '&#x2705; 回答正确！' : '&#x274C; 回答错误') + '</div>' +
        '<div class="explanation">正确答案：<span class="correct-answer">' + cs + '</span></div>';
}

function refreshQuizView() {
    var btns = document.querySelectorAll('.option-btn');
    var q = state.questions[state.idx];
    var cAns = (q.answer || '').split(';').map(function(a) { return a.trim(); });
    btns.forEach(function(btn) {
        btn.classList.add('disabled');
        var v = btn.dataset.value;
        if (cAns.indexOf(v) >= 0) btn.classList.add('correct');
        if (cAns.indexOf(v) < 0 && state.selected.indexOf(v) >= 0) btn.classList.add('wrong');
    });
    var sb = document.getElementById('multiSb');
    if (sb) sb.style.display = 'none';
}

function highlightJudge() {
    var btns = document.querySelectorAll('.option-btn');
    var correctAns = (state.questions[state.idx].answer || '').trim();
    btns.forEach(function(btn) {
        if (btn.dataset.value === correctAns) btn.classList.add('correct');
        if (btn.dataset.value !== correctAns && state.selected.indexOf(btn.dataset.value) >= 0) btn.classList.add('wrong');
    });
}

function saveOrderProgress() {
    if (state.mode !== 'order') return;
    var pg = getProgress();
    var i = state.idx;
    var sl = QUESTION_DATA.single.length;
    var ml = QUESTION_DATA.multi.length;
    if (i < sl) pg.single = Math.max(pg.single, i + 1);
    else if (i < sl + ml) pg.multi = Math.max(pg.multi, i - sl + 1);
    else pg.judge = Math.max(pg.judge, i - sl - ml + 1);
    saveProgress(pg);
}

function prevQ() {
    if (state.idx > 0) { state.idx--; state.answered = false; state.selected = []; render(); window.scrollTo(0,0); }
}
function nextQ() {
    if (state.idx < state.questions.length - 1) { state.idx++; state.answered = false; state.selected = []; render(); window.scrollTo(0,0); }
    else {
        if (state.mode === 'order') toast('&#x1F389; 顺序练习完成！');
        else if (state.mode === 'random') toast('&#x1F389; 本轮随机练习完成！');
        setTimeout(function() { navigateTo('home'); }, 1500);
    }
}

// ==================== 模拟考试 ====================
function renderExamSettings(m) {
    var history = getExamHistory();
    var hHtml = '';
    if (history.length > 0) {
        hHtml = '<div style="margin-top:20px"><h4 style="margin-bottom:10px">&#x1F4CA; 考试记录</h4>';
        history.reverse().forEach(function(h) {
            var pct = Math.round((h.score / h.total) * 100);
            hHtml += '<div class="wrong-item" style="cursor:default"><span>' + (pct >= 60 ? '&#x2705;' : '&#x274C;') + '</span><span class="q-preview">' + h.date + ' &#183; ' + h.score + '/' + h.total + ' (' + pct + '%) &#183; ' + h.timeUsed + '</span></div>';
        });
        hHtml += '</div>';
    }
    m.innerHTML = '<div class="exam-settings"><h3>&#x2699;&#xFE0F; 考试设置</h3>' +
        '<div class="setting-row"><span>单选题数量</span><input type="number" id="exS" value="' + state.examSet.single + '" min="5" max="' + QUESTION_DATA.single.length + '"></div>' +
        '<div class="setting-row"><span>多选题数量</span><input type="number" id="exM" value="' + state.examSet.multi + '" min="2" max="' + QUESTION_DATA.multi.length + '"></div>' +
        '<div class="setting-row"><span>判断题数量</span><input type="number" id="exJ" value="' + state.examSet.judge + '" min="2" max="' + QUESTION_DATA.judge.length + '"></div>' +
        '<div class="setting-row"><span>考试时间(分钟)</span><input type="number" id="exT" value="' + state.examSet.time + '" min="5" max="120"></div>' +
        '<button class="submit-btn" onclick="startExam()" style="margin-top:20px">开始考试</button></div>' + hHtml;
}

function startExam() {
    var sc = parseInt(document.getElementById('exS').value) || 20;
    var mc = parseInt(document.getElementById('exM').value) || 10;
    var jc = parseInt(document.getElementById('exJ').value) || 10;
    var tm = parseInt(document.getElementById('exT').value) || 30;
    state.examSet = {single:sc, multi:mc, judge:jc, time:tm};

    var qs = [];
    var sp = QUESTION_DATA.single.slice(); shuffle(sp);
    var mp = QUESTION_DATA.multi.slice(); shuffle(mp);
    var jp = QUESTION_DATA.judge.slice(); shuffle(jp);
    sp.slice(0, sc).forEach(function(q) { qs.push({question:q.question, answer:q.answer, options:q.options, id:q.id, type:'single'}); });
    mp.slice(0, mc).forEach(function(q) { qs.push({question:q.question, answer:q.answer, options:q.options, id:q.id, type:'multi'}); });
    jp.slice(0, jc).forEach(function(q) { qs.push({question:q.question, answer:q.answer, id:q.id, type:'judge'}); });
    shuffle(qs);

    state.questions = qs;
    state.idx = 0;
    state.mode = 'exam';
    state.answered = false;
    state.selected = [];
    state.examAnswers = [];
    state.examLeft = tm * 60;
    state.page = 'exam-quiz';

    var backBtn = document.getElementById('backBtn');
    document.getElementById('headerTitle').textContent = '模拟考试';
    backBtn.style.display = 'flex';

    render();
    startExamTimer();
    window.scrollTo(0,0);
}

function startExamTimer() {
    if (state.examTimer) clearInterval(state.examTimer);
    state.examTimer = setInterval(function() {
        state.examLeft--;
        var mins = Math.floor(state.examLeft / 60);
        var secs = state.examLeft % 60;
        document.getElementById('headerTitle').textContent = '⏱ ' + mins + ':' + (secs < 10 ? '0' : '') + secs;
        if (state.examLeft <= 0) submitExam();
    }, 1000);
}

function renderExamQuiz(m) {
    if (state.questions.length === 0) { m.innerHTML = '<p style="text-align:center;padding:60px;color:#999">没有题目</p>'; return; }

    var q = state.questions[state.idx];
    var total = state.questions.length;
    var idx = state.idx + 1;
    var isJudge = q.type === 'judge';
    var ansCount = state.examAnswers.length;

    var badge = q.type === 'single' ? '<span class="question-type-badge badge-single">单选题</span>' :
                q.type === 'multi' ? '<span class="question-type-badge badge-multi">多选题</span>' :
                '<span class="question-type-badge badge-judge">判断题</span>';

    var prevAns = null;
    for (var i = 0; i < state.examAnswers.length; i++) { if (state.examAnswers[i].index === state.idx) { prevAns = state.examAnswers[i]; break; } }
    var prevSel = prevAns ? prevAns.selected : [];

    var optsHtml = '';
    if (isJudge) {
        optsHtml = '<div class="options-list">' +
            '<button class="option-btn' + (prevSel[0] === '正确' ? ' selected' : '') + '" data-value="正确" onclick="examJudge(this,\'正确\')"><span class="letter">&#x2713;</span>正确</button>' +
            '<button class="option-btn' + (prevSel[0] === '错误' ? ' selected' : '') + '" data-value="错误" onclick="examJudge(this,\'错误\')"><span class="letter">&#x2717;</span>错误</button>' +
            '</div>';
    } else {
        var keys = Object.keys(q.options).filter(function(k) { return q.options[k] && q.options[k].trim(); });
        optsHtml = '<div class="options-list">';
        keys.forEach(function(k) {
            var cls = prevSel.indexOf(k) >= 0 ? ' selected' : '';
            optsHtml += '<button class="option-btn' + cls + '" data-value="' + k + '" onclick="examOption(this,\'' + (q.type === 'multi' ? 'multi' : 'single') + '\')"><span class="letter">' + k + '</span>' + q.options[k] + '</button>';
        });
        optsHtml += '</div>';
        if (q.type === 'multi') {
            optsHtml += '<p class="multi-hint">点击选项选择，可多选。选择后自动保存答案</p>';
        }
    }

    var pct = Math.round((ansCount / total) * 100);
    m.innerHTML = '<div class="progress-wrap"><div class="progress-info"><span>' + idx + ' / ' + total + '</span><span>已答 ' + ansCount + '</span></div><div class="progress-bar"><div class="fill" style="width:' + pct + '%"></div></div></div>' +
        badge +
        '<div class="question-text"><div class="q-id">#' + q.id + '</div>' + q.question + '</div>' +
        optsHtml +
        '<div class="nav-btns"><button class="nav-btn" onclick="examPrev()"' + (state.idx === 0 ? ' disabled' : '') + '>上一题</button><button class="nav-btn" onclick="examNext()">' + (state.idx < total - 1 ? '下一题' : '回顾检查') + '</button></div>' +
        '<button class="submit-btn" style="margin-top:12px;background:#C62828" onclick="submitExam()">交卷</button>';
}

function examOption(btn, type) {
    var v = btn.dataset.value;
    var prevAns = null;
    for (var i = 0; i < state.examAnswers.length; i++) { if (state.examAnswers[i].index === state.idx) { prevAns = state.examAnswers[i]; break; } }
    var sel = prevAns ? prevAns.selected.slice() : [];

    if (type === 'single') {
        sel = [v];
        state.examAnswers = state.examAnswers.filter(function(a) { return a.index !== state.idx; });
        state.examAnswers.push({index: state.idx, selected: sel});
    } else {
        var idx = sel.indexOf(v);
        if (idx >= 0) { sel.splice(idx, 1); btn.classList.remove('selected'); }
        else { sel.push(v); btn.classList.add('selected'); }
        if (sel.length > 0) {
            state.examAnswers = state.examAnswers.filter(function(a) { return a.index !== state.idx; });
            state.examAnswers.push({index: state.idx, selected: sel});
        } else {
            state.examAnswers = state.examAnswers.filter(function(a) { return a.index !== state.idx; });
        }
    }

    // Refresh option highlights
    var btns = btn.parentElement.querySelectorAll('.option-btn');
    btns.forEach(function(b) {
        if (sel.indexOf(b.dataset.value) >= 0) b.classList.add('selected');
        else b.classList.remove('selected');
    });
}

function examJudge(btn, value) {
    state.examAnswers = state.examAnswers.filter(function(a) { return a.index !== state.idx; });
    state.examAnswers.push({index: state.idx, selected: [value]});
    var btns = btn.parentElement.querySelectorAll('.option-btn');
    btns.forEach(function(b) {
        if (b.dataset.value === value) b.classList.add('selected');
        else b.classList.remove('selected');
    });
}

function examPrev() {
    if (state.idx > 0) { state.idx--; render(); window.scrollTo(0,0); }
}
function examNext() {
    if (state.idx < state.questions.length - 1) { state.idx++; render(); window.scrollTo(0,0); }
}

function submitExam() {
    if (state.examTimer) { clearInterval(state.examTimer); state.examTimer = null; }
    var total = state.questions.length;
    var correct = 0;
    var details = [];

    state.questions.forEach(function(q, i) {
        var ua = null;
        for (var j = 0; j < state.examAnswers.length; j++) { if (state.examAnswers[j].index === i) { ua = state.examAnswers[j]; break; } }
        var us = ua ? ua.selected.slice().sort().join('') : '';
        var cs = (q.answer || '').split(';').map(function(a) { return a.trim(); }).sort().join('');
        var ok = us === cs;
        if (ok) correct++;
        details.push({q: q.question, ua: ua ? ua.selected.join('、') : '未作答', ca: cs.replace(/(.)/g, '$1、').replace(/、$/, ''), ok: ok});
        if (!ok) addWrong(q, q.type);
    });

    var used = state.examSet.time * 60 - state.examLeft;
    var ts = Math.floor(used / 60) + '分' + (used % 60) + '秒';
    var pct = Math.round((correct / total) * 100);
    var passed = pct >= 60;

    var history = getExamHistory();
    history.push({date: new Date().toLocaleDateString('zh-CN'), score: correct, total: total, timeUsed: ts});
    saveExamHistory(history);

    state._result = {correct:correct, total:total, pct:pct, passed:passed, timeUsed:ts, details:details};
    state.page = 'exam-result';
    document.getElementById('headerTitle').textContent = passed ? '✅ 考试通过' : '❌ 未通过';
    render();
    window.scrollTo(0,0);
}

function renderExamResult(m) {
    var r = state._result;
    if (!r) { navigateTo('exam'); return; }

    var dHtml = r.details.map(function(d, i) {
        return '<div class="wrong-item" style="cursor:default;flex-wrap:wrap"><span>' + (d.ok ? '&#x2705;' : '&#x274C;') + '</span>' +
            '<span style="flex:1;font-size:13px;line-height:1.5"><div style="font-weight:500">' + (i+1) + '. ' + d.q + '</div>' +
            '<div style="color:#999;font-size:12px;margin-top:3px">你的答案：' + d.ua + ' | 正确：' + d.ca + '</div></span></div>';
    }).join('');

    m.innerHTML = '<div class="result-score' + (r.passed ? ' passed' : '') + '"><div class="big-score">' + r.score + '</div><div class="score-label">' + (r.passed ? '恭喜通过！' : '继续努力') + ' &#183; ' + r.pct + '分（60分及格）</div></div>' +
        '<div class="result-detail"><h4>&#x1F4CA; 考试统计</h4>' +
        '<div class="result-item"><span>总题数</span><span>' + r.total + '</span></div>' +
        '<div class="result-item"><span>正确</span><span style="color:#2E7D32">' + r.correct + '</span></div>' +
        '<div class="result-item"><span>错误</span><span style="color:#C62828">' + (r.total - r.correct) + '</span></div>' +
        '<div class="result-item"><span>用时</span><span>' + r.timeUsed + '</span></div></div>' +
        '<h4 style="margin:20px 0 10px">&#x1F4DD; 答题详情</h4>' + dHtml +
        '<button class="submit-btn" onclick="navigateTo(\'exam\')" style="margin:16px 0 30px">返回考试设置</button>';
}

// ==================== 错题集 ====================
function renderWrongList(m) {
    var wl = getWrong();
    if (wl.length === 0) { m.innerHTML = '<div class="wrong-empty"><span class="empty-icon">&#x1F389;</span><p>太棒了，没有错题！</p></div>'; return; }

    var html = '<div class="wrong-actions"><button class="wrong-action-btn" onclick="startWrongPractice(null)">&#x1F500; 随机练习全部错题</button><button class="wrong-action-btn" onclick="clearWrong()" style="color:#C62828">&#x1F5D1; 清空错题</button></div>';

    function renderSection(list, type, title, pool) {
        if (list.length === 0) return '';
        var items = '';
        list.forEach(function(w) {
            var q = pool.find(function(qq) { return qq.id === w.id; });
            if (!q) return;
            items += '<div class="wrong-item" style="cursor:pointer" onclick="startWrongType(\'' + type + '\')"><span class="q-preview">' + q.question + '</span><button class="wrong-action-btn" style="flex:none;width:auto;padding:6px 12px;font-size:11px" onclick="event.stopPropagation();removeWrongById(' + q.id + ',\'' + type + '\')">移除</button></div>';
        });
        return '<div class="wrong-type-title">' + title + ' (' + list.length + '题)</div>' + items;
    }

    var sw = wl.filter(function(w) { return w.type === 'single'; });
    var mw = wl.filter(function(w) { return w.type === 'multi'; });
    var jw = wl.filter(function(w) { return w.type === 'judge'; });

    html += renderSection(sw, 'single', '📘 单选题错题', QUESTION_DATA.single);
    html += renderSection(mw, 'multi', '📙 多选题错题', QUESTION_DATA.multi);
    html += renderSection(jw, 'judge', '📕 判断题错题', QUESTION_DATA.judge);
    m.innerHTML = html;
}

function clearWrong() {
    if (confirm('确定要清空所有错题吗？')) { saveWrong([]); navigateTo('wrong'); }
}
function removeWrongById(id, type) {
    var list = getWrong().filter(function(w) { return !(w.type === type && w.id === id); });
    saveWrong(list);
    navigateTo('wrong');
}

function startWrongType(type) {
    startWrongPractice(type);
}

function startWrongPractice(type) {
    var wl = getWrong();
    if (type) wl = wl.filter(function(w) { return w.type === type; });
    if (wl.length === 0) { toast('没有错题可练习'); return; }

    var qs = [];
    wl.forEach(function(w) {
        var pool = w.type === 'single' ? QUESTION_DATA.single : w.type === 'multi' ? QUESTION_DATA.multi : QUESTION_DATA.judge;
        var q = pool.find(function(qq) { return qq.id === w.id; });
        if (q) {
            if (w.type === 'judge') qs.push({question:q.question, answer:q.answer, id:q.id, type:'judge'});
            else qs.push({question:q.question, answer:q.answer, options:q.options, id:q.id, type:w.type});
        }
    });
    shuffle(qs);
    state.questions = qs;
    state.idx = 0;
    state.mode = 'wrong-practice';
    state.answered = false;
    state.selected = [];
    state.page = 'quiz';
    updateHeaderForQuiz();
    render();
    window.scrollTo(0,0);
}

// ==================== 工具 ====================
function toast(msg) {
    var el = document.getElementById('toast');
    el.innerHTML = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2000);
}

function init() {
    updateWrongDot();
    navigateTo('home');
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(function() {});
    }
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
